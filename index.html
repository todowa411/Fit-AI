                </div>
                <span style={{color:"var(--mu)",fontSize:13}}>{mesoExp===i?"↑":"↓"}</span>
              </div>
              {mesoExp===i && (
                <div className="pdb">
                  {w.days?.map((d,j)=>(
                    <div key={j} style={{padding:"7px 0",borderTop:"1px solid var(--bd)",fontSize:12}}>
                      <div style={{fontWeight:700,color:"var(--mu)",marginBottom:2}}>{d.day} – {d.type}</div>
                      <div>{d.exercises}</div>
                    </div>
                  ))}
                  {w.tip && <div style={{marginTop:9,fontSize:12,color:"var(--p)"}}>💡 {w.tip}</div>}
                </div>
              )}
            </div>
          ))}
        </>
      )}

      {/* ══ CHAT ══ */}
      {sub === "chat" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:900,color:"var(--p)",marginBottom:11}}>PERSÖNLICHER AI COACH</div>
          {activePlan && (
            <div style={{background:"rgba(200,255,0,.06)",border:"1px solid rgba(200,255,0,.15)",borderRadius:10,padding:"8px 12px",marginBottom:11,fontSize:12,color:"var(--mu)"}}>
              ⚡ Aktiver Plan: <strong style={{color:"var(--g)"}}>{activePlan.name}</strong>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:9,minHeight:260,marginBottom:11}}>
            {chat.length === 0 && (
              <div style={{textAlign:"center",padding:"18px 0"}}>
                <div style={{fontSize:44,marginBottom:9}}>🤖</div>
                <p style={{fontSize:13,color:"var(--mu)",marginBottom:13}}>Dein Coach kennt deinen aktiven Plan & deine Workouts. Frag alles!</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
                  {QS.map(q=><button key={q} onClick={()=>setChatIn(q)} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,background:"var(--s3)",border:"1px solid var(--bd)",color:"var(--mu)",cursor:"pointer"}}>{q}</button>)}
                </div>
              </div>
            )}
            {chat.map((m,i)=>m.role==="ai"?<div key={i} className="abub fu">{m.text}</div>:<div key={i} className="ubub fu">{m.text}</div>)}
            {chatLoad && <div className="abub ac" style={{gap:9}}><span className="spin"/><span style={{color:"var(--mu)"}}>Coach denkt nach…</span></div>}
            <div ref={chatEnd}/>
          </div>
          <div className="row">
            <input className="inp f1" placeholder="Frage stellen…" value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}/>
            <button className="btn btp" style={{width:44,padding:0}} onClick={sendChat}>↑</button>
          </div>
        </div>
      )}

      {/* ══ FORM CHECK ══ */}
      {sub === "form" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--o)",marginBottom:5}}>AI FORM-CHECK 🎥</div>
          <p style={{fontSize:13,color:"var(--mu)",marginBottom:13}}>Foto hochladen → Claude analysiert deine Übungsform wie ein Elite-Trainer.</p>
          <div className="g12">
            <div><label className="lbl">Welche Übung?</label><select className="sel" value={frmEx} onChange={e=>setFrmEx(e.target.value)}>{ALL_EXERCISES.map(e=><option key={e.n}>{e.n}</option>)}</select></div>
            <div className="pbox" onClick={()=>frmRef.current.click()}>
              {frmPhoto?<img src={frmPhoto} alt="form"/>:<><span style={{fontSize:36}}>🎥</span><span style={{fontSize:13,color:"var(--mu)",fontWeight:600}}>Foto hochladen</span><span style={{fontSize:11,color:"var(--mu)",opacity:.7}}>Seitlich oder von vorne ideal</span></>}
            </div>
            <input ref={frmRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
              const f=e.target.files[0]; if(!f)return;
              setFrmPhoto(URL.createObjectURL(f)); setFrmResult(null); setFrmErr(false);
              const r=new FileReader(); r.onload=()=>setFrmB64(r.result.split(",")[1]); r.readAsDataURL(f);
            }}/>
            {frmPhoto && !frmResult && <button className="btn bto" onClick={analyzeForm} disabled={frmLoad}>{frmLoad?<><span className="spin"/> Analysiere…</>:"🔍 Form analysieren"}</button>}
            {frmErr && <div style={{color:"var(--er)",fontSize:13,textAlign:"center"}}>⚠️ Fehler. Erneut versuchen.</div>}
            {frmResult && <div className="abub fu">{frmResult}</div>}
          </div>
        </div>
      )}
    </div>
  );
}
  const [plan,       setPlan]       = useState(null);
  const [planLoad,   setPlanLoad]   = useState(false);
  const [planErr,    setPlanErr]    = useState(false);
  const [expanded,   setExpanded]   = useState(null);
  const [meso,       setMeso]       = useState(null);
  const [mesoLoad,   setMesoLoad]   = useState(false);
  const [mesoErr,    setMesoErr]    = useState(false);
  const [mesoExp,    setMesoExp]    = useState(null);
  const [chat,       setChat]       = useState([]);
  const [chatIn,     setChatIn]     = useState("");
  const [chatLoad,   setChatLoad]   = useState(false);
  const [frmPhoto,   setFrmPhoto]   = useState(null);
  const [frmB64,     setFrmB64]     = useState(null);
  const [frmEx,      setFrmEx]      = useState("Bankdrücken");
  const [frmResult,  setFrmResult]  = useState(null);
  const [frmLoad,    setFrmLoad]    = useState(false);
  const [frmErr,     setFrmErr]     = useState(false);
  const frmRef   = useRef();
  const chatEnd  = useRef();

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:"smooth" }); }, [chat]);

  const genPlan = async () => {
    setPlanLoad(true); setPlan(null); setPlanErr(false);
    try {
      const txt = await askClaude("Du bist Sportwissenschaftler. Nur JSON, kein Markdown.",
        `${form.days}-Tage Trainingsplan: Ziel=${form.goal}, Level=${form.level}, Equipment=${form.equipment}, Fokus=${form.focus||"Ganzkörper"}. JSON: {"name":"...","description":"...","duration":"8 Wochen","progressionTip":"...","days":[{"day":"Tag 1 – Push","focus":"Brust,Schultern,Trizeps","warmup":"3 Min Aufwärmen","exercises":[{"name":"Bankdrücken","sets":"4","reps":"8-10","rest":"90s","tip":"...","progressive":"..."}],"cooldown":"5 Min Stretching"}],"tips":["...","...","..."]}`);
      const parsed = parseJSON(txt);
      if (parsed) { setPlan(parsed); addXP(50); }
      else { setPlanErr(true); }
    } catch { setPlanErr(true); }
    setPlanLoad(false);
  };

  const genMeso = async () => {
    setMesoLoad(true); setMeso(null); setMesoErr(false);
    try {
      const txt = await askClaude("Du bist Sportwissenschaftler. Nur JSON, kein Markdown.",
        `8-Wochen-Mesozyklus: Ziel=${form.goal}, Level=${form.level}. JSON: {"name":"...","weeks":[{"week":1,"phase":"Eingewöhnung","volume":"mittel","intensity":"niedrig","tip":"...","days":[{"day":"Mo","type":"Push","exercises":"Bankdrücken 3×10, Schulterdrücken 3×10"},{"day":"Mi","type":"Pull","exercises":"Klimmzüge 3×8"},{"day":"Fr","type":"Legs","exercises":"Kniebeugen 3×10"}]}]}`);
      const parsed = parseJSON(txt);
      if (parsed) { setMeso(parsed); }
      else { setMesoErr(true); }
    } catch { setMesoErr(true); }
    setMesoLoad(false);
  };

  const sendChat = async () => {
    if (!chatIn.trim()) return;
    const msg = chatIn.trim(); setChatIn("");
    setChat(c => [...c, { role:"user", text:msg }]);
    setChatLoad(true);
    try {
      const recentW = workouts.slice(0,3).map(w=>`${w.date}: ${w.exercises?.map(e=>e.name).join(", ")}`).join(" | ");
      const hist    = chat.slice(-6).map(m=>`${m.role==="user"?"Du":"Coach"}: ${m.text}`).join("\n");
      const txt     = await askClaude(
        `Du bist persönlicher AI Fitness-Coach. Nutzerprofil: Ziel=${profile.goal||"Muskelaufbau"}, Level=${profile.level||"Anfänger"}, Gewicht=${profile.weight||"?"}kg, Größe=${profile.height||"?"}cm. Letzte Workouts: ${recentW||"keine"}. Antworte auf Deutsch, konkret, max 3 Absätze.`,
        hist ? `${hist}\nDu: ${msg}` : msg);
      setChat(c => [...c, { role:"ai", text:txt }]);
    } catch {
      setChat(c => [...c, { role:"ai", text:"Verbindungsfehler. Bitte erneut versuchen." }]);
    }
    setChatLoad(false);
  };

  const analyzeForm = async () => {
    if (!frmB64) return;
    setFrmLoad(true); setFrmResult(null); setFrmErr(false);
    try {
      const txt = await askClaude("Du bist Elite-Personal-Trainer. Analysiere Trainingsform auf Fotos präzise auf Deutsch.",
        [{ type:"image", source:{ type:"base64", media_type:"image/jpeg", data:frmB64 } },
         { type:"text",  text:`Analysiere die Übungsausführung bei "${frmEx}". Gib: 1) Bewertung 1-10, 2) Was gut ist, 3) Was verbessert werden muss, 4) Verletzungsrisiken, 5) Konkrete Korrektur-Tipps. Sei direkt und spezifisch.` }], true);
      setFrmResult(txt); addXP(75);
    } catch { setFrmErr(true); }
    setFrmLoad(false);
  };

  const QS = ["Wieviel Protein täglich?","Progressive Overload erklären","Beste Übungen für V-Taper?","Cardio vor oder nach Training?","Was ist Deload?","Wie berechne ich meine Makros?","Optimale Satzzahl pro Muskel?","Natürliche Trainingsgrenze?"];

  return (
    <div>
      <div className="hdr"><div className="ht">AI COACH</div><span className="tag tp">🤖 Claude AI</span></div>
      <div className="stabs">
        {[["plan","📋 Plan"],["meso","🔄 Mesozyklus"],["chat","💬 Chat"],["form","🎥 Form-Check"]].map(([id,l])=>(
          <div key={id} className={`stab${sub===id?" on":""}`} onClick={()=>setSub(id)}>{l}</div>
        ))}
      </div>

      {/* PLAN */}
      {sub === "plan" && (
        <>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--p)",marginBottom:11}}>AI TRAININGSPLAN</div>

              <div className="row">
                <div className="f1"><label className="lbl">Ziel</label><select className="sel" value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))}>{["Muskelaufbau","Fettabbau","Kraft steigern","Ausdauer","Definition"].map(g=><option key={g}>{g}</option>)}</select></div>
                <div className="f1"><label className="lbl">Level</label><select className="sel" value={form.level} onChange={e=>setForm(f=>({...f,level:e.target.value}))}>{["Anfänger","Fortgeschrittener","Profi"].map(l=><option key={l}>{l}</option>)}</select></div>
              </div>
              <div className="row">
                <div className="f1"><label className="lbl">Tage/Woche</label><select className="sel" value={form.days} onChange={e=>setForm(f=>({...f,days:e.target.value}))}>{["2","3","4","5","6"].map(d=><option key={d}>{d}</option>)}</select></div>
                <div className="f1"><label className="lbl">Equipment</label><select className="sel" value={form.equipment} onChange={e=>setForm(f=>({...f,equipment:e.target.value}))}>{["Gym","Zuhause KH","Kein Equipment","Barbell only"].map(e=><option key={e}>{e}</option>)}</select></div>
              </div>
              <div><label className="lbl">Fokus / Problemzonen</label><input className="inp" placeholder="z.B. Brust, Rücken, Bauch…" value={form.focus} onChange={e=>setForm(f=>({...f,focus:e.target.value}))}/></div>
              <button className="btn btp" onClick={genPlan} disabled={planLoad}>{planLoad?<><span className="spin"/> Generiere…</>:"🤖 Plan generieren"}</button>
            </div>
          </div>
          {planErr && <div className="card" style={{textAlign:"center",color:"var(--er)"}}>⚠️ Fehler. Bitte erneut versuchen.</div>}
          {plan && (
            <>
              <div className="card" style={{background:"linear-gradient(135deg,#131028,#0b1020)",borderColor:"rgba(123,97,255,.2)"}}>
                <div style={{fontFamily:"var(--fh)",fontSize:22,fontWeight:900,color:"var(--p)"}}>{plan.name}</div>
                <p style={{fontSize:13,color:"var(--mu)",margin:"5px 0 9px"}}>{plan.description}</p>
                {plan.progressionTip && <div style={{fontSize:12,color:"var(--cy)",borderTop:"1px solid var(--bd)",paddingTop:9}}>📈 {plan.progressionTip}</div>}
              </div>
              {plan.days?.map((day,i)=>(
                <div key={i} className="pd">
                  <div className="pdh" onClick={()=>setExpanded(expanded===i?null:i)}>
                    <div><div style={{fontWeight:700,fontSize:14}}>{day.day}</div><div style={{fontSize:11,color:"var(--mu)"}}>{day.focus}</div></div>
                    <span style={{color:"var(--mu)",fontSize:15,fontWeight:700}}>{expanded===i?"↑":"↓"}</span>
                  </div>
                  {expanded===i && (
                    <div className="pdb">
                      {day.warmup && <div style={{fontSize:11,color:"var(--am)",marginBottom:9}}>🔥 {day.warmup}</div>}
                      {day.exercises?.map((ex,j)=>(
                        <div key={j} style={{padding:"9px 0",borderTop:j>0?"1px solid var(--bd)":"none"}}>
                          <div className="jb" style={{marginBottom:3}}>
                            <span style={{fontWeight:700,fontSize:13}}>{ex.name}</span>
                            <div className="row" style={{gap:4}}>
                              <span className="tag tg" style={{fontSize:9}}>{ex.sets}×{ex.reps}</span>
                              <span className="tag to" style={{fontSize:9}}>⏱{ex.rest}</span>
                            </div>
                          </div>
                          {ex.tip && <div style={{fontSize:11,color:"var(--mu)"}}>💡 {ex.tip}</div>}
                          {ex.progressive && <div style={{fontSize:10,color:"var(--ok)",marginTop:2}}>📈 {ex.progressive}</div>}
                        </div>
                      ))}

      )}

      {/* CHAT */}
      {sub === "chat" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:900,color:"var(--p)",marginBottom:11}}>PERSÖNLICHER AI COACH</div>

            {chat.length === 0 && (
              <div style={{textAlign:"center",padding:"18px 0"}}>
                <div style={{fontSize:44,marginBottom:9}}>🤖</div>
                <p style={{fontSize:13,color:"var(--mu)",marginBottom:13}}>Dein Coach kennt dein Profil & deine letzten Workouts. Frag alles!</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
                  {QS.map(q=><button key={q} onClick={()=>setChatIn(q)} style={{padding:"5px 10px",borderRadius:99,fontSize:11,fontWeight:600,background:"var(--s3)",border:"1px solid var(--bd)",color:"var(--mu)",cursor:"pointer"}}>{q}</button>)}
                </div>
              </div>
            )}
            {chat.map((m,i)=>m.role==="ai"
              ? <div key={i} className="abub fu">{m.text}</div>
              : <div key={i} className="ubub fu">{m.text}</div>

            {chatLoad && <div className="abub ac" style={{gap:9}}><span className="spin"/><span style={{color:"var(--mu)"}}>Coach denkt nach…</span></div>}

      {/* FORM CHECK */}
      {sub === "form" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--o)",marginBottom:5}}>AI FORM-CHECK 🎥</div>

          <div className="g12">
            <div>
              <label className="lbl">Welche Übung?</label>
              <select className="sel" value={frmEx} onChange={e=>setFrmEx(e.target.value)}>

              </select>
            </div>
            <div className="pbox" onClick={()=>frmRef.current.click()}>
              {frmPhoto ? <img src={frmPhoto} alt="form"/> : (
                <><span style={{fontSize:36}}>🎥</span><span style={{fontSize:13,color:"var(--mu)",fontWeight:600}}>Foto hochladen</span><span style={{fontSize:11,color:"var(--mu)",opacity:.7}}>Seitlich oder von vorne ideal</span></>
              )}
            </div>
            <input ref={frmRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
              const f=e.target.files[0]; if(!f)return;
              setFrmPhoto(URL.createObjectURL(f)); setFrmResult(null); setFrmErr(false);
              const r=new FileReader(); r.onload=()=>setFrmB64(r.result.split(",")[1]); r.readAsDataURL(f);
            }}/>
            {frmPhoto && !frmResult && (
              <button className="btn bto" onClick={analyzeForm} disabled={frmLoad}>
                {frmLoad ? <><span className="spin"/> Analysiere Form…</> : "🔍 Form analysieren"}
              </button>
            )}
            {frmErr && <div style={{color:"var(--er)",fontSize:13,textAlign:"center"}}>⚠️ Analyse fehlgeschlagen. Erneut versuchen.</div>}
            {frmResult && <div className="abub fu">{frmResult}</div>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   1RM CALCULATOR (proper component, no hooks in IIFE)
═══════════════════════════════════════════ */
function RMCalc() {
  const [kg,   setKg]   = useState("");
  const [reps, setReps] = useState("");
  const rm = (kg && reps && Number(reps) > 0) ? calc1RM(Number(kg), Number(reps)) : null;
  return (
    <div className="card">
      <div style={{fontFamily:"var(--fh)",fontSize:15,fontWeight:900,marginBottom:11,color:"var(--am)"}}>1RM KALKULATOR</div>
      <div className="g12">
        <div className="row">
          <div className="f1"><label className="lbl">Gewicht (kg)</label><input className="inp" type="number" placeholder="80" value={kg} onChange={e=>setKg(e.target.value)}/></div>
          <div className="f1"><label className="lbl">Wiederholungen</label><input className="inp" type="number" placeholder="8" value={reps} onChange={e=>setReps(e.target.value)}/></div>
        </div>
        {rm && (
          <div style={{textAlign:"center",padding:"13px 0"}}>
            <div style={{fontFamily:"var(--fh)",fontSize:46,fontWeight:900,color:"var(--g)",lineHeight:1}}>{rm} kg</div>
            <div style={{fontSize:12,color:"var(--mu)",marginTop:3}}>Geschätztes 1RM (Epley-Formel)</div>
            <div style={{display:"flex",justifyContent:"space-around",marginTop:11}}>
              {[[90,.9],[85,.85],[80,.8],[75,.75],[70,.7]].map(([p,f])=>(
                <div key={p} style={{textAlign:"center"}}>
                  <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:900,color:"var(--p)"}}>{Math.round(rm*f)}kg</div>
                  <div style={{fontSize:9,color:"var(--mu)"}}>{p}%</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function Stats({ workouts, meals, profile, setProfile, xp, badges }) {
  const [sub,    setSub]    = useState("stats");
  const [selEx,  setSelEx]  = useState("Bankdrücken");
  const [newWt,  setNewWt]  = useState("");
  const [bodyLog,setBodyLog] = useState(() => {
    const w = Number(profile.weight) || 80;
    return [{d:"01.04",w:w-3},{d:"08.04",w:w-2},{d:"15.04",w:w-1},{d:"22.04",w:w},{d:"29.04",w:w+0.5}];
  });

  // Profile editing state
  const [editP,    setEditP]    = useState(null);   // draft copy of profile
  const [savedMsg, setSavedMsg] = useState(false);

  const openProfileEdit  = () => setEditP({ ...profile, zones: [...(profile.zones||[])] });
  const cancelProfileEdit= () => setEditP(null);
  const saveProfileEdit  = () => {
    setProfile(editP);
    setEditP(null);
    setSavedMsg(true);
    setTimeout(() => setSavedMsg(false), 2200);
  };
  const togZone = (z) => setEditP(p => ({
    ...p,
    zones: p.zones.includes(z) ? p.zones.filter(x=>x!==z) : [...p.zones, z],
  }));
  const level    = lvl(xp);
  const totVol   = workouts.reduce((s,w)=>s+(w.volume||0),0);
  const totSets  = workouts.reduce((s,w)=>s+(w.totalSets||0),0);

  const exHistory = useMemo(() => {
    const hist = {};
    [...workouts].reverse().forEach(w => {
      w.exercises?.forEach(e => {
        if (!hist[e.name]) hist[e.name] = [];
        const sets = e.sets || [];
        if (!sets.length) return;
        const best = sets.reduce((b, s) => calc1RM(Number(s.kg)||0,Number(s.reps)||0) > calc1RM(Number(b.kg)||0,Number(b.reps)||0) ? s : b, sets[0]);
        hist[e.name].push({ date:w.date, oneRM:calc1RM(Number(best.kg)||0,Number(best.reps)||0) });
      });
    });
    return hist;
  }, [workouts]);

  const fakeVol = [8200,9100,8700,10200,11400,10800,12100,13400];
  const maxFV   = Math.max(...fakeVol);

  const { bmi, bmr, tdee } = useMemo(() => {
    const w = Number(profile.weight)||0, h = Number(profile.height)||0, a = Number(profile.age)||25;
    if (!w || !h) return { bmi:0, bmr:0, tdee:0 };
    const bmi  = (w / Math.pow(h/100, 2)).toFixed(1);
    const bmr  = Math.round(88.362 + 13.397*w + 4.799*h - 5.677*a);
    return { bmi, bmr, tdee: Math.round(bmr * 1.55) };
  }, [profile]);

  const exData   = exHistory[selEx] || [];
  const maxOneRM = exData.length ? Math.max(...exData.map(d=>d.oneRM)) : 0;

  return (
    <div>
      <div className="hdr"><div className="ht">FORTSCHRITT</div><div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--g)"}}>LVL {level}</div></div>
      <div className="stabs">
        {[["stats","📊 Stats"],["exercise","💪 Übungen"],["body","⚖️ Körper"],["badges","🏆 Badges"],["profil","👤 Profil"]].map(([id,l])=>(
          <div key={id} className={`stab${sub===id?" on":""}`} onClick={()=>setSub(id)}>{l}</div>
        ))}
      </div>

      {/* STATS */}
      {sub === "stats" && (
        <>
          <div className="sgrid" style={{gridTemplateColumns:"1fr 1fr"}}>
            {[[workouts.length,"Workouts","var(--g)"],
              [(totVol/1000).toFixed(1)+"t","Volumen","var(--o)"],
              [totSets,"Sätze","var(--p)"],
              ["12 Tage","Streak 🔥","var(--am)"],
              [meals.length,"Mahlzeiten","var(--cy)"],
              ["LVL "+level,"Level","var(--ok)"]].map(([v,l,c])=>(
              <div key={l} className="scard">
                <div className="sv" style={{color:c,fontSize:String(v).length>7?16:24}}>{v}</div>
                <div className="sl">{l}</div>
              </div>
            ))}
          </div>

          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,marginBottom:11}}>TRAININGSVOLUMEN (8 WOCHEN)</div>
            <div className="bar-wrap">
              {fakeVol.map((v,i)=>(
                <div key={i} style={{flex:1}}>
                  <div className="bar" style={{height:`${(v/maxFV)*78}px`,background:i===fakeVol.length-1?"linear-gradient(180deg,var(--g),rgba(200,255,0,.35))":"rgba(255,255,255,.09)"}}/>
                  <div className="blb">W{i+1}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,marginBottom:11}}>MUSKELGRUPPEN-VERTEILUNG</div>
            {[["Brust",28,"var(--g)"],["Rücken",24,"var(--p)"],["Beine",20,"var(--o)"],["Schultern",15,"var(--ok)"],["Arme",13,"var(--cy)"]].map(([n,p,c])=>(
              <div key={n} style={{marginBottom:9}}>
                <div className="jb" style={{marginBottom:4}}><span style={{fontSize:13,fontWeight:600}}>{n}</span><span style={{fontSize:12,color:c,fontWeight:700}}>{p}%</span></div>
                <div className="pb"><div className="pf" style={{width:p+"%",background:c}}/></div>
              </div>
            ))}
          </div>

          <div className="sec">PERSONAL RECORDS 🏆</div>
          {[["Bankdrücken","100 kg"],["Kniebeugen","120 kg"],["Kreuzheben","140 kg"],["Schulterdrücken KH","35 kg"],["Klimmzüge","BW+20 kg"]].map(([e,v])=>(
            <div key={e} className="card" style={{padding:"11px 16px"}}>
              <div className="jb"><div className="ac"><span style={{fontSize:19}}>🏆</span><span style={{fontWeight:700,fontSize:13}}>{e}</span></div><div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--g)"}}>{v}</div></div>
            </div>
          ))}
        </>
      )}

      {/* EXERCISE PROGRESS */}
      {sub === "exercise" && (
        <>
          <div style={{padding:"0 14px",marginBottom:10}}>
            <label className="lbl">Übung auswählen</label>
            <select className="sel" value={selEx} onChange={e=>setSelEx(e.target.value)}>
              {ALL_EXERCISES.map(e=><option key={e.n}>{e.n}</option>)}
            </select>
          </div>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,marginBottom:3}}>{selEx}</div>
            <div style={{fontSize:11,color:"var(--mu)",marginBottom:11}}>Estimated 1RM Verlauf</div>
            {exData.length > 0 ? (
              <>
                <div className="bar-wrap" style={{height:75}}>
                  {exData.map((d,i)=>(
                    <div key={i} style={{flex:1}}>
                      <div className="bar" style={{height:`${(d.oneRM/(maxOneRM||1))*68}px`,background:i===exData.length-1?"var(--g)":"rgba(200,255,0,.25)"}}/>
                      <div className="blb">{(d.date||"").split(".").slice(0,2).join(".")}</div>
                    </div>
                  ))}
                </div>
                <div className="jb" style={{marginTop:9}}>
                  <span style={{fontSize:12,color:"var(--mu)"}}>Bestes 1RM</span>
                  <span style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--g)"}}>{maxOneRM} kg</span>
                </div>
              </>
            ) : (
              <div className="empty" style={{padding:"18px 0"}}>
                <span style={{fontSize:30,display:"block",marginBottom:7}}>📊</span>
                <p style={{fontSize:12,color:"var(--mu)"}}>Logge diese Übung im Training für Verlaufsdaten</p>
              </div>
            )}
          </div>
          <RMCalc />
        </>
      )}

      {/* BODY */}
      {sub === "body" && (
        <>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,marginBottom:11}}>GEWICHTSVERLAUF</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:7,marginBottom:13}}>
              {bodyLog.map((e,i)=>{
                const mn   = Math.min(...bodyLog.map(b=>b.w));
                const mx   = Math.max(...bodyLog.map(b=>b.w));
                const norm = (e.w - mn) / ((mx - mn) || 1);
                return (
                  <div key={i} style={{flex:1,textAlign:"center"}}>
                    <div style={{fontFamily:"var(--fh)",fontSize:12,fontWeight:900,color:i===bodyLog.length-1?"var(--g)":"var(--mu)"}}>{e.w}</div>
                    <div style={{height:`${18+norm*48}px`,background:i===bodyLog.length-1?"var(--g)":"rgba(255,255,255,.1)",borderRadius:"4px 4px 0 0",margin:"3px 0",transition:"height .6s"}}/>
                    <div style={{fontSize:9,color:"var(--mu)",fontWeight:700}}>{e.d}</div>

              })}
            </div>
            <div className="row">
              <input className="inp f1" type="number" step="0.1" placeholder="Gewicht eintragen (kg)…" value={newWt} onChange={e=>setNewWt(e.target.value)}/>
              <button className="btn btg" style={{width:"auto",padding:"11px 14px"}} onClick={()=>{

            </div>
          </div>
        </>

          <div className="card" style={{background:"linear-gradient(135deg,#181208,#0e1020)",marginBottom:13}}>

              <div key={a} className="jb" style={{padding:"6px 0",borderTop:"1px solid var(--bd)",fontSize:12}}>
                <span style={{color:"var(--mu)"}}>{a}</span><span className="tag tg" style={{fontSize:9}}>{x}</span>
              </div>
            ))}
          </div>
        </>

      {/* ══ PROFIL ══ */}
      {sub === "profil" && (

              ✅ Profil gespeichert!
            </div>

          {/* Overview card */}
          {!editP && (
            <div className="card" style={{background:"linear-gradient(135deg,#111128,#0c1020)",borderColor:"rgba(123,97,255,.2)"}}>
              <div className="jb" style={{marginBottom:14}}>
                <div>
                  <div style={{fontFamily:"var(--fh)",fontSize:26,fontWeight:900,color:"var(--g)",lineHeight:1}}>{profile.name||"–"}</div>
                  <div style={{fontSize:12,color:"var(--mu)",marginTop:3}}>{profile.goal||"–"} · {profile.level||"–"}</div>

                <div style={{fontSize:44}}>🏋️</div>

                  ["🎯 Ziel",       profile.goal||"–"],
                  ["📊 Level",      profile.level||"–"],
                  ["📅 Tage/Wo",    (profile.days||"–")+" Tage"],
                  ["🏟️ Equipment",  profile.equipment||"–"],
                  ["📏 Größe",      profile.height ? profile.height+"cm" : "–"],
                  ["⚖️ Gewicht",    profile.weight ? profile.weight+"kg" : "–"],
                  ["🎂 Alter",      profile.age||"–"],
                  ["👤 Geschlecht", profile.gender||"–"],
                ].map(([l,v])=>(
                  <div key={l} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"9px 11px"}}>
                    <div style={{fontSize:10,color:"var(--mu)",fontWeight:700,marginBottom:2}}>{l}</div>
                    <div style={{fontSize:14,fontWeight:700}}>{v}</div>
                  </div>
                ))}
              </div>

                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,color:"var(--mu)",fontWeight:700,marginBottom:7}}>FOKUSZONEN</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {profile.zones.map(z=>(
                      <span key={z} className="tag tp">{MG[z]?.icon} {z}</span>
                    ))}
                  </div>
                </div>
              )}

            </div>
          )}

          {/* Edit form */}
          {editP && (
            <>
              <div style={{position:"sticky",top:0,zIndex:60,background:"var(--bg)",padding:"8px 14px 10px",borderBottom:"1px solid var(--bd)",backdropFilter:"blur(8px)",marginBottom:4}}>
                <div className="jb">
                  <div style={{fontFamily:"var(--fh)",fontSize:18,fontWeight:900,color:"var(--p)"}}>PROFIL BEARBEITEN</div>
                  <div className="row" style={{gap:7}}>
                    <button className="btn btgh btsm" style={{width:"auto"}} onClick={cancelProfileEdit}>Abbrechen</button>
                    <button className="btn btg  btsm" style={{width:"auto"}} onClick={saveProfileEdit}>Speichern ✓</button>
                  </div>
                </div>
              </div>

              <div className="card">
                <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,color:"var(--g)",marginBottom:11}}>PERSÖNLICHE DATEN</div>
                <div className="g12">
                  <div>
                    <label className="lbl">Name</label>
                    <input className="inp" placeholder="Dein Name" value={editP.name||""} onChange={e=>setEditP(p=>({...p,name:e.target.value}))}/>
                  </div>
                  <div className="row">
                    <div className="f1">
                      <label className="lbl">Geschlecht</label>
                      <select className="sel" value={editP.gender||""} onChange={e=>setEditP(p=>({...p,gender:e.target.value}))}>
                        <option value="">–</option>
                        <option>Männlich</option><option>Weiblich</option><option>Divers</option>
                      </select>
                    </div>
                    <div className="f1">
                      <label className="lbl">Alter</label>
                      <input className="inp" type="number" placeholder="25" value={editP.age||""} onChange={e=>setEditP(p=>({...p,age:e.target.value}))}/>
                    </div>
                  </div>
                  <div className="row">
                    <div className="f1">
                      <label className="lbl">Größe (cm)</label>
                      <input className="inp" type="number" placeholder="180" value={editP.height||""} onChange={e=>setEditP(p=>({...p,height:e.target.value}))}/>
                    </div>
                    <div className="f1">
                      <label className="lbl">Gewicht (kg)</label>
                      <input className="inp" type="number" placeholder="80" value={editP.weight||""} onChange={e=>setEditP(p=>({...p,weight:e.target.value}))}/>
                    </div>
                  </div>
                </div>
              </div>

              <div className="card">
                <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,color:"var(--o)",marginBottom:11}}>TRAINING</div>
                <div className="g12">
                  <div>
                    <label className="lbl">Trainingsziel</label>
                    <select className="sel" value={editP.goal||""} onChange={e=>setEditP(p=>({...p,goal:e.target.value}))}>
                      {["Muskelaufbau","Fettabbau","Kraft steigern","Ausdauer","Allgemein fit"].map(v=><option key={v}>{v}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="lbl">Erfahrungslevel</label>
                    <select className="sel" value={editP.level||""} onChange={e=>setEditP(p=>({...p,level:e.target.value}))}>
                      {["Anfänger","Fortgeschrittener","Profi"].map(v=><option key={v}>{v}</option>)}
                    </select>
                  </div>
                  <div className="row">
                    <div className="f1">
                      <label className="lbl">Trainingstage/Woche</label>
                      <select className="sel" value={editP.days||"4"} onChange={e=>setEditP(p=>({...p,days:e.target.value}))}>
                        {["2","3","4","5","6"].map(v=><option key={v}>{v}</option>)}
                      </select>
                    </div>
                    <div className="f1">
                      <label className="lbl">Equipment</label>
                      <select className="sel" value={editP.equipment||""} onChange={e=>setEditP(p=>({...p,equipment:e.target.value}))}>
                        {["Gym","Zuhause KH","Kein Equipment","Barbell only"].map(v=><option key={v}>{v}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              <div className="card">
                <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,color:"var(--p)",marginBottom:5}}>FOKUSZONEN</div>
                <div style={{fontSize:12,color:"var(--mu)",marginBottom:11}}>Welche Muskeln willst du besonders entwickeln?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {Object.entries(MG).map(([k,v])=>{
                    const on = (editP.zones||[]).includes(k);
                    return (
                      <div key={k} onClick={()=>togZone(k)}
                        style={{padding:"8px 14px",borderRadius:99,border:`1.5px solid ${on?"var(--g)":"var(--bd)"}`,background:on?"rgba(200,255,0,.1)":"var(--s3)",fontSize:13,fontWeight:600,cursor:"pointer",color:on?"var(--g)":"var(--mu)",transition:"all .16s"}}>
                        {v.icon} {k}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{padding:"0 14px 4px"}}>
                <button className="btn btg" onClick={saveProfileEdit}>✓ Änderungen speichern</button>
              </div>
            </>
          )}
          {!editP && <ApiKeyManager/>}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════ */
const TABS = [
  {id:"home",     i:"⚡", l:"Home"},
  {id:"training", i:"🏋️", l:"Training"},
  {id:"nutrition",i:"🥗", l:"Ernährung"},
  {id:"ai",       i:"🤖", l:"AI Coach"},
  {id:"stats",    i:"📈", l:"Fortschritt"},
];

function App() {
  const [onboarded, setOnboarded] = useState(false);
  const [profile,   setProfile]   = useState({});
  const [tab,       setTab]       = useState("home");
  const [workouts,  setWorkouts]  = useState([]);
  const [meals,     setMeals]     = useState([]);
  const [water,     setWater]     = useState(0);
  const [steps,     setSteps]     = useState(3420);
  const [xp,        setXp]        = useState(340);
  const [doms,      setDoms]      = useState({});
  const [habits,    setHabits]    = useState({});
  const [badges]                  = useState(["b1","b3"]);

  const addXP = useCallback(n => setXp(x => x + n), []);

  if (!onboarded) return (
    <>
      <div className="app">
        <Onboarding onDone={d => { setProfile(d); setOnboarded(true); addXP(100); }}/>
      </div>
    </>
  );

  return (
    <>
      <div className="app">
        <div className="scr">
          {tab==="home"     && <Dashboard  profile={profile} workouts={workouts} meals={meals} water={water} xp={xp} setTab={setTab} doms={doms} habits={habits} setHabits={setHabits} steps={steps} setSteps={setSteps}/>}
          {tab==="training" && <Training   workouts={workouts} setWorkouts={setWorkouts} doms={doms} setDoms={setDoms} addXP={addXP}/>}
          {tab==="nutrition"&& <Nutrition  meals={meals} setMeals={setMeals} water={water} setWater={setWater} addXP={addXP} profile={profile}/>}
          {tab==="ai"       && <AICoach    profile={profile} addXP={addXP} workouts={workouts}/>}
          {tab==="stats"    && <Stats      workouts={workouts} meals={meals} profile={profile} setProfile={setProfile} xp={xp} badges={badges}/>}
        </div>
        <nav className="nav">
          {TABS.map(t => (
            <div key={t.id} className={`ni${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>
              <span className="ni-ic">{t.i}</span>
              <span className="ni-lb">{t.l}</span>
              <div className="ni-dot"/>
            </div>
          ))}
        </nav>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════
   API KEY SETUP SCREEN
═══════════════════════════════════════════ */
function ApiKeySetup({ onSave }) {
  const [key, setKey] = React.useState('');
  const [show, setShow] = React.useState(false);
  const [testing, setTesting] = React.useState(false);
  const [testErr, setTestErr] = React.useState('');

  const testAndSave = async () => {
    if (!key.trim().startsWith('sk-ant-')) {
      setTestErr('Der API Key muss mit "sk-ant-" beginnen.');
      return;
    }
    setTesting(true); setTestErr('');
    try {
      localStorage.setItem('fitpro_api_key', key.trim());
      // Quick test call
      await askClaude('Antworte nur mit: OK', 'Antworte nur mit: OK');
      onSave(key.trim());
    } catch(e) {
      localStorage.removeItem('fitpro_api_key');
      if (e.message === 'NO_API_KEY') setTestErr('Kein API Key eingegeben.');
      else setTestErr('Key ungültig oder Verbindungsfehler: ' + e.message);
    }
    setTesting(false);
  };

  return (
    <div style={{minHeight:'100dvh',background:'linear-gradient(180deg,#0b0b18,#07070f)',display:'flex',flexDirection:'column',justifyContent:'center',padding:'40px 24px'}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:'#c8ff00',letterSpacing:2,marginBottom:28}}>⚡ FITPRO AI</div>

      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,lineHeight:1.05,marginBottom:8,textTransform:'uppercase'}}>
        API Key <span style={{color:'#c8ff00'}}>einrichten</span>
      </div>
      <div style={{fontSize:14,color:'#5c5c78',marginBottom:24,lineHeight:1.65}}>
        Die KI-Funktionen (Trainingsplan, Mahlzeiten-Analyse, Chat) brauchen deinen persönlichen Anthropic API Key.
      </div>

      {/* Steps */}
      <div style={{background:'#161624',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:18,marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:'#5c5c78',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>So bekommst du deinen Key:</div>
        {[
          ['1','console.anthropic.com öffnen'],
          ['2','Kostenlos registrieren (oder einloggen)'],
          ['3','Links auf "API Keys" klicken'],
          ['4','"Create Key" → Key kopieren'],
        ].map(([n,t]) => (
          <div key={n} style={{display:'flex',gap:10,marginBottom:9,fontSize:13,alignItems:'flex-start'}}>
            <div style={{width:22,height:22,borderRadius:'50%',background:'rgba(200,255,0,.15)',border:'1px solid rgba(200,255,0,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#c8ff00',flexShrink:0}}>{n}</div>
            <span style={{color:'#eeeef8'}}>{t}</span>
          </div>
        ))}
        <div style={{marginTop:10,padding:10,background:'rgba(0,229,255,.08)',borderRadius:10,border:'1px solid rgba(0,229,255,.2)',fontSize:12,color:'#5c5c78'}}>
          💡 Neue Accounts bekommen <strong style={{color:'#00e5ff'}}>$5 Gratis-Guthaben</strong> – reicht für hunderte Plan-Generierungen.
        </div>
      </div>

      {/* Input */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:'#5c5c78',textTransform:'uppercase',letterSpacing:.8,marginBottom:6}}>Dein API Key</div>
        <div style={{position:'relative'}}>
          <input
            type={show?'text':'password'}
            placeholder="sk-ant-api03-..."
            value={key}
            onChange={e=>{ setKey(e.target.value); setTestErr(''); }}
            style={{width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:11,padding:'12px 44px 12px 14px',color:'#eeeef8',fontFamily:"'DM Sans',sans-serif",fontSize:14,outline:'none'}}
          />
          <button onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#5c5c78'}}>
            {show?'🙈':'👁️'}
          </button>
        </div>
        {testErr && <div style={{marginTop:8,fontSize:12,color:'#ff4757'}}>{testErr}</div>}
      </div>

      <button onClick={testAndSave} disabled={testing||!key.trim()} style={{background:'#c8ff00',border:'none',borderRadius:12,padding:'14px 20px',fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:15,color:'#07070f',cursor:key.trim()?'pointer':'default',opacity:key.trim()?1:.5,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        {testing ? <><span className="spin" style={{borderTopColor:'#07070f'}}/> Verbindung testen…</> : '✓ Key speichern & starten'}
      </button>

      <div style={{marginTop:16,fontSize:11,color:'#5c5c78',textAlign:'center',lineHeight:1.6}}>
        🔒 Der Key wird nur lokal auf deinem Gerät gespeichert.<br/>Er wird nie an Dritte weitergegeben.
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   API KEY SETTINGS BUTTON (in Stats Profil)
═══════════════════════════════════════════ */
function ApiKeyManager() {
  const [key, setKey] = React.useState(() => localStorage.getItem('fitpro_api_key') || '');
  const [show, setShow] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const save = () => {
    localStorage.setItem('fitpro_api_key', key.trim());
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };
  const remove = () => { localStorage.removeItem('fitpro_api_key'); setKey(''); };
  return (
    <div className="card">
      <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,color:'var(--cy)',marginBottom:11}}>🔑 ANTHROPIC API KEY</div>
      {saved && <div style={{marginBottom:9,padding:'8px 12px',background:'rgba(0,230,118,.12)',border:'1px solid rgba(0,230,118,.3)',borderRadius:9,fontSize:12,fontWeight:700,color:'var(--ok)',textAlign:'center'}}>✅ Gespeichert!</div>}
      <div className="g8">
        <div style={{position:'relative'}}>
          <input type={show?'text':'password'} className="inp" placeholder="sk-ant-api03-..." value={key} onChange={e=>setKey(e.target.value)} style={{paddingRight:44}}/>
          <button onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:15,color:'var(--mu)'}}>
            {show?'🙈':'👁️'}
          </button>
        </div>
        <div className="row" style={{gap:7}}>
          <button className="btn btgh f1 btsm" style={{fontSize:12}} onClick={remove}>🗑️ Entfernen</button>
          <button className="btn btg f1 btsm" style={{fontSize:12}} onClick={save} disabled={!key.trim()}>💾 Speichern</button>
        </div>
        <div style={{fontSize:11,color:'var(--mu)',lineHeight:1.6}}>Key unter console.anthropic.com erstellen. Neue Accounts erhalten $5 Gratis-Guthaben.</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PERSISTENT APP WITH API KEY GATE
═══════════════════════════════════════════ */
function PersistentApp() {
  const KEY = 'fitpro_v2';
  const load = (k, d) => { try { const r = localStorage.getItem(KEY); return r ? (JSON.parse(r)[k] ?? d) : d; } catch { return d; } };

  const [apiKey,     setApiKey]     = React.useState(() => localStorage.getItem('fitpro_api_key') || '');
  const [onboarded,  setOnboarded]  = React.useState(() => load('ob', false));
  const [profile,    setProfile]    = React.useState(() => load('pr', {}));
  const [workouts,   setWorkouts]   = React.useState(() => load('wo', []));
  const [meals,      setMeals]      = React.useState(() => load('me', []));
  const [water,      setWater]      = React.useState(() => load('wa', 0));
  const [steps,      setSteps]      = React.useState(() => load('st', 0));
  const [xp,         setXp]         = React.useState(() => load('xp', 0));
  const [doms,       setDoms]       = React.useState(() => load('do', {}));
  const [habits,     setHabits]     = React.useState(() => load('ha', {}));
  const [badges,     setBadges]     = React.useState(() => load('ba', ['b1']));
  const [tab,        setTab]        = React.useState('home');

  React.useEffect(() => {
    try { localStorage.setItem(KEY, JSON.stringify({ob:onboarded,pr:profile,wo:workouts,me:meals,wa:water,st:steps,xp,do:doms,ha:habits,ba:badges})); }
    catch(e) { console.warn('Save failed', e); }
  }, [onboarded, profile, workouts, meals, water, steps, xp, doms, habits, badges]);

  const addXP = React.useCallback(n => setXp(x => x + n), []);

  // Step 1: API Key gate
  if (!apiKey) return React.createElement(ApiKeySetup, { onSave: k => setApiKey(k) });

  // Step 2: Onboarding
  if (!onboarded) return React.createElement(Onboarding, {
    onDone: d => { setProfile(d); setOnboarded(true); addXP(100); }
  });

  const TABS = [{id:'home',i:'⚡',l:'Home'},{id:'training',i:'🏋️',l:'Training'},{id:'nutrition',i:'🥗',l:'Ernährung'},{id:'ai',i:'🤖',l:'AI Coach'},{id:'stats',i:'📈',l:'Fortschritt'}];

  return React.createElement('div', {className:'app'},
    React.createElement('div', {className:'scr'},
      tab==='home'      && React.createElement(Dashboard,  {profile,workouts,meals,water,xp,setTab,doms,habits,setHabits,steps,setSteps}),
      tab==='training'  && React.createElement(Training,   {workouts,setWorkouts,doms,setDoms,addXP}),
      tab==='nutrition' && React.createElement(Nutrition,  {meals,setMeals,water,setWater,addXP,profile}),
      tab==='ai'        && React.createElement(AICoach,    {profile,addXP,workouts}),
      tab==='stats'     && React.createElement(Stats,      {workouts,meals,profile,setProfile,xp,badges,ApiKeyManager}),
    ),
    React.createElement('nav', {className:'nav'},
      TABS.map(t => React.createElement('div', {key:t.id, className:`ni${tab===t.id?' on':''}`, onClick:()=>setTab(t.id)},
        React.createElement('span', {className:'ni-ic'}, t.i),
        React.createElement('span', {className:'ni-lb'}, t.l),
        React.createElement('div',  {className:'ni-dot'}),
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PersistentApp));

  </script>
  <script>
    requestAnimationFrame(() => { document.getElementById('ld-bar').style.width = '100%'; });
    setTimeout(() => {
      const el = document.getElementById('loading');
      if (el) { el.classList.add('hide'); setTimeout(() => el.remove(), 450); }
    }, 2100);
  </script>
</body>
