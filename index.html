<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FitPro AI"/>
  <meta name="theme-color" content="#07070f"/>
  <title>FitPro AI</title>
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='%2307070f'/%3E%3Ctext x='256' y='360' font-size='300' text-anchor='middle'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E"/>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2307070f'/%3E%3Ctext x='16' y='23' font-size='18' text-anchor='middle'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f; --s1:#0f0f1a; --s2:#161624; --s3:#1e1e30;
  --bd:rgba(255,255,255,.07); --bd2:rgba(255,255,255,.12);
  --g:#c8ff00; --o:#ff6b35; --p:#7b61ff; --cy:#00e5ff; --am:#ff9f43;
  --ok:#00e676; --er:#ff4757; --tx:#eeeef8; --mu:#5c5c78;
  --fh:'Barlow Condensed',sans-serif; --fb:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);overscroll-behavior:none;height:100dvh;overflow:hidden}
.app{max-width:430px;height:100dvh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
.scr{flex:1;overflow-y:auto;padding-bottom:calc(88px + env(safe-area-inset-bottom,0px));min-height:0;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{width:2px}
.scr::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(7,7,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);
  display:flex;z-index:100;padding:6px 0 calc(env(safe-area-inset-bottom,0px) + 8px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;cursor:pointer;transition:all .2s}
.ni-ic{font-size:20px;transition:transform .2s;line-height:1}
.ni-lb{font-size:9px;font-weight:700;letter-spacing:.6px;color:var(--mu);text-transform:uppercase}
.ni.on .ni-ic{transform:scale(1.2) translateY(-2px)}
.ni.on .ni-lb{color:var(--g)}
.ni-dot{width:4px;height:4px;border-radius:50%;background:var(--g);opacity:0;transition:opacity .2s;margin-top:1px}
.ni.on .ni-dot{opacity:1}

/* HEADER */
.hdr{padding:52px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,var(--bg) 60%,transparent);
  position:sticky;top:0;z-index:50;backdrop-filter:blur(6px)}
.ht{font-family:var(--fh);font-size:28px;font-weight:900;letter-spacing:2px;color:var(--g);text-transform:uppercase;line-height:1}
.hsub{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:18px;padding:16px;margin:0 14px 10px}
.card2{background:var(--s3);border:1px solid var(--bd);border-radius:13px;padding:13px}
.sec{font-family:var(--fh);font-size:18px;font-weight:800;letter-spacing:1.5px;
  padding:0 14px;margin:4px 0 8px;text-transform:uppercase;color:var(--tx)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 18px;border-radius:12px;font-family:var(--fb);font-weight:700;
  font-size:14px;cursor:pointer;border:none;transition:all .16s;width:100%;letter-spacing:.1px}
.btn:active{transform:scale(.97)}
.btg{background:var(--g);color:#07070f}.btg:hover{filter:brightness(1.08)}
.bto{background:var(--o);color:#fff}
.btp{background:var(--p);color:#fff}
.btc{background:var(--cy);color:#07070f}
.btgh{background:rgba(255,255,255,.07);color:var(--tx);border:1px solid var(--bd)}
.btsm{padding:9px 14px;font-size:12px;border-radius:10px}
.btxs{padding:6px 11px;font-size:11px;border-radius:8px;width:auto}

/* INPUTS */
.inp{background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:11px;
  padding:11px 13px;color:var(--tx);font-family:var(--fb);font-size:14px;
  width:100%;outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--p)}
.inp::placeholder{color:var(--mu)}
.sel{background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:11px;
  padding:11px 13px;color:var(--tx);font-size:14px;width:100%;outline:none;cursor:pointer}
.sel option{background:#1e1e30}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:5px;display:block}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:10.5px;font-weight:700}
.tg{background:rgba(200,255,0,.11);color:var(--g);border:1px solid rgba(200,255,0,.22)}
.to{background:rgba(255,107,53,.11);color:var(--o);border:1px solid rgba(255,107,53,.22)}
.tp{background:rgba(123,97,255,.11);color:var(--p);border:1px solid rgba(123,97,255,.22)}
.tc{background:rgba(0,229,255,.11);color:var(--cy);border:1px solid rgba(0,229,255,.22)}
.ts{background:rgba(0,230,118,.11);color:var(--ok);border:1px solid rgba(0,230,118,.22)}
.tam{background:rgba(255,159,67,.11);color:var(--am);border:1px solid rgba(255,159,67,.22)}

/* PROGRESS */
.pb{height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .6s ease}

/* LAYOUT */
.row{display:flex;gap:8px}
.f1{flex:1}
.g8{display:flex;flex-direction:column;gap:8px}
.g12{display:flex;flex-direction:column;gap:12px}
.jb{display:flex;align-items:center;justify-content:space-between}
.ac{display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--bd);margin:10px 0}

/* SUBTABS */
.stabs{display:flex;gap:6px;padding:0 14px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;
  white-space:nowrap;border:1px solid var(--bd);background:var(--s2);color:var(--mu);
  transition:all .16s;flex-shrink:0}
.stab.on{background:var(--g);color:#07070f;border-color:transparent}

/* SET ROW */
.srow{display:grid;grid-template-columns:26px 1fr 1fr 56px 32px;gap:5px;
  align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)}
.srow:last-child{border-bottom:none}
.sn{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--mu);text-align:center}
.sn.done{color:var(--g)}
.schk{width:30px;height:30px;border-radius:8px;border:2px solid var(--bd2);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .18s}
.schk.done{background:var(--g);border-color:var(--g);color:#07070f}

/* REST TIMER */
.rt-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(7,7,15,.97);backdrop-filter:blur(20px);
  border:1px solid rgba(200,255,0,.35);border-radius:18px;padding:13px 20px;
  z-index:200;display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 24px rgba(200,255,0,.12);
  max-width:350px;width:calc(100% - 28px)}

/* PHOTO BOX */
.pbox{background:rgba(255,255,255,.03);border:2px dashed var(--bd);border-radius:15px;
  height:165px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;gap:7px;transition:all .2s}
.pbox:hover{border-color:var(--p);background:rgba(123,97,255,.05)}
.pbox img{width:100%;height:100%;border-radius:13px;object-fit:cover}

/* CHAT BUBBLES */
.abub{background:linear-gradient(135deg,rgba(123,97,255,.14),rgba(200,255,0,.06));
  border:1px solid rgba(123,97,255,.22);border-radius:15px 15px 15px 4px;
  padding:13px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.ubub{background:rgba(255,255,255,.07);border:1px solid var(--bd);
  border-radius:15px 15px 4px 15px;padding:11px;font-size:13px;
  line-height:1.65;align-self:flex-end;max-width:86%}

/* WATER */
.glass{width:32px;height:46px;border-radius:4px 4px 8px 8px;border:2px solid rgba(0,229,255,.3);
  cursor:pointer;position:relative;overflow:hidden;transition:all .2s}
.glass-fill{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(0,229,255,.65),rgba(0,150,200,.85));
  transition:height .35s ease}

/* HERO CARD */
.hero{margin:0 14px 10px;border-radius:20px;padding:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;
  border-radius:50%;background:radial-gradient(circle,rgba(200,255,0,.13) 0%,transparent 70%);
  pointer-events:none}

/* STATS GRID */
.sgrid{display:grid;gap:8px;padding:0 14px;margin-bottom:10px}
.scard{background:var(--s2);border:1px solid var(--bd);border-radius:15px;padding:14px 12px}
.sv{font-family:var(--fh);font-size:26px;font-weight:900;line-height:1}
.sl{font-size:9px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

/* HABIT GRID */
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:0 14px;margin-bottom:10px}
.hi{background:var(--s2);border:1.5px solid var(--bd);border-radius:13px;
  padding:11px 6px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
.hi.on{border-color:rgba(200,255,0,.35);background:rgba(200,255,0,.07)}
.hi-ic{font-size:21px;display:block;margin-bottom:3px}
.hi-lb{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.2px}
.hi.on .hi-lb{color:var(--g)}

/* DOMS */
.dgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:0 14px;margin-bottom:10px}
.di{background:var(--s2);border:2px solid var(--bd);border-radius:13px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.di.l1{border-color:rgba(0,230,118,.4)}
.di.l2{border-color:rgba(255,159,67,.45)}
.di.l3{border-color:rgba(255,107,53,.5)}
.di.l4{border-color:rgba(255,71,87,.55)}

/* BADGE GRID */
.badgegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 14px;margin-bottom:10px}
.bdg{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:13px 8px;text-align:center;transition:all .2s}
.bdg.earn{border-color:rgba(200,255,0,.25);background:rgba(200,255,0,.05)}
.bdg-ic{font-size:26px;margin-bottom:5px;display:block;filter:grayscale(1);transition:filter .2s}
.bdg.earn .bdg-ic{filter:none}
.bdg-n{font-size:10px;font-weight:700;color:var(--mu);line-height:1.3}
.bdg.earn .bdg-n{color:var(--tx)}

/* WEEK STRIP */
.wstrip{display:flex;gap:5px;padding:0 14px;margin-bottom:10px}
.wd{flex:1;padding:8px 3px;border-radius:10px;text-align:center;font-size:9px;font-weight:700;transition:all .18s}
.wd-n{font-family:var(--fh);font-size:17px;font-weight:900;display:block}

/* MACRO BAR */
.mbar{display:flex;height:7px;border-radius:99px;overflow:hidden;gap:2px}

/* PLAN DAY */
.pd{background:var(--s2);border:1px solid var(--bd);border-radius:13px;margin:0 14px 8px;overflow:hidden}
.pdh{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;background:rgba(255,255,255,.02)}
.pdb{padding:0 15px 13px}

/* PR BADGE */
.pr-badge{background:linear-gradient(135deg,rgba(200,255,0,.14),rgba(200,255,0,.04));
  border:1px solid rgba(200,255,0,.28);border-radius:11px;padding:10px 13px;
  display:flex;align-items:center;gap:9px}

/* ONBOARDING */
.ob{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;
  padding:44px 22px;background:linear-gradient(180deg,#0b0b18 0%,#07070f 100%)}
.ob-bar{height:3px;background:rgba(255,255,255,.08);border-radius:99px;margin-bottom:26px}
.ob-pf{height:100%;background:var(--g);border-radius:99px;transition:width .4s ease}
.ob-ttl{font-family:var(--fh);font-size:36px;font-weight:900;line-height:1.05;margin-bottom:5px;text-transform:uppercase}
.ob-sub{font-size:14px;color:var(--mu);margin-bottom:22px;line-height:1.55}
.ob-opt{background:var(--s2);border:2px solid var(--bd);border-radius:15px;padding:15px 17px;
  cursor:pointer;transition:all .16s;display:flex;align-items:center;gap:13px;margin-bottom:9px}
.ob-opt.sel{border-color:var(--g);background:rgba(200,255,0,.07)}
.ob-chip{padding:8px 15px;border-radius:99px;border:1.5px solid var(--bd);
  background:var(--s2);font-size:13px;font-weight:600;cursor:pointer;transition:all .16s}
.ob-chip.sel{border-color:var(--g);background:rgba(200,255,0,.1);color:var(--g)}

/* EDIT / DELETE */
.del-btn{background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.3);color:var(--er);
  border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;transition:all .16s}
.del-btn:hover{background:rgba(255,71,87,.28)}
.edit-btn{background:rgba(123,97,255,.15);border:1px solid rgba(123,97,255,.3);color:var(--p);
  border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;transition:all .16s}
.edit-btn:hover{background:rgba(123,97,255,.28)}
.del-row{display:grid;grid-template-columns:26px 1fr 1fr 56px 28px 28px;gap:4px;
  align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)}
.del-row:last-child{border-bottom:none}
.confirm-bar{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);
  border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 14px 10px}
.ex-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:rgba(255,255,255,.02);border-radius:10px;margin-bottom:6px}

/* MISC */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:17px;height:17px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--g);
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .28s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 1.2s ease infinite}
.empty{text-align:center;padding:30px 16px}
.empty-ic{font-size:44px;display:block;margin-bottom:8px;opacity:.45}
.bar-wrap{display:flex;align-items:flex-end;gap:4px}
.bar{border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease}
.blb{font-size:9px;color:var(--mu);font-weight:700;text-align:center;margin-top:3px}
html{height:100dvh;overflow:hidden}
#loading{position:fixed;inset:0;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .4s ease}
#loading.hide{opacity:0;pointer-events:none}
#ld-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:#c8ff00;letter-spacing:3px}
#ld-bar-wrap{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
#ld-bar{height:100%;width:0;background:#c8ff00;border-radius:99px;transition:width 1.6s ease}
#ld-sub{font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1.5px;text-transform:uppercase}
#root{height:100dvh;overflow:hidden}
  </style>
</head>

  <div id="loading">
    <div id="ld-title">⚡ FITPRO AI</div>
    <div id="ld-bar-wrap"><div id="ld-bar"></div></div>
    <div id="ld-sub">Dein persönlicher AI Trainer</div>
  </div>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const MG = {
  Brust:     { icon:"💪", color:"#c8ff00", ex:["Bankdrücken","Schrägbankdrücken oben","Schrägbankdrücken unten","Butterfly","Kabelzüge","Dips Brust","Push-Ups","Incline Dumbbell Press"] },
  Rücken:    { icon:"🔙", color:"#7b61ff", ex:["Klimmzüge","Kinnzüge","Latzug","Seated Row","Vorgebeugtes Rudern","Einarmiges Rudern","Face Pull","Kreuzheben","Rack Pull","T-Bar Rudern"] },
  Schultern: { icon:"🎯", color:"#ff9f43", ex:["Schulterdrücken KH","Schulterdrücken SZ","Arnold Press","Seitheben","Frontheben","Reverse Fly","Upright Row","Shrugs"] },
  Beine:     { icon:"🦵", color:"#ff6b35", ex:["Kniebeugen","Beinpresse","Bulgarian Split Squat","Ausfallschritte","Beinstrecker","Beinbeuger","Wadenheben","Rumänisches Kreuzheben","Hack Squat"] },
  Bizeps:    { icon:"🦾", color:"#00e676", ex:["KH-Curl","SZ-Curl","Hammercurl","Konzentrations-Curl","Cable-Curl","Schrägbank-Curl","21er"] },
  Trizeps:   { icon:"💡", color:"#fd79a8", ex:["Trizepsdrücken","Skull Crusher","Dips Trizeps","Overhead Extension","Kickback","Pushdown Seil","Close-Grip Bench"] },
  Bauch:     { icon:"⚡", color:"#fdcb6e", ex:["Crunches","Plank","Russian Twists","Beinheben","Dragon Flag","Mountain Climbers","Cable Crunch","Rollout","Reverse Crunch"] },
};

const ALL_EXERCISES = Object.entries(MG).flatMap(([mg,{ex,color,icon}])=>ex.map(n=>({n,mg,color,icon})));

const TEMPLATES = [
  { name:"Push Pull Legs", icon:"🔥", days:[
    { name:"Push", focus:"Brust · Schultern · Trizeps", ex:[{mg:"Brust",n:"Bankdrücken",sets:4,reps:"8-10"},{mg:"Brust",n:"Schrägbankdrücken oben",sets:3,reps:"10-12"},{mg:"Schultern",n:"Schulterdrücken KH",sets:3,reps:"10-12"},{mg:"Schultern",n:"Seitheben",sets:4,reps:"15-20"},{mg:"Trizeps",n:"Trizepsdrücken",sets:3,reps:"12-15"}]},
    { name:"Pull", focus:"Rücken · Bizeps", ex:[{mg:"Rücken",n:"Klimmzüge",sets:4,reps:"6-10"},{mg:"Rücken",n:"Seated Row",sets:3,reps:"10-12"},{mg:"Rücken",n:"Latzug",sets:3,reps:"10-12"},{mg:"Bizeps",n:"KH-Curl",sets:3,reps:"12-15"},{mg:"Bizeps",n:"Hammercurl",sets:3,reps:"12-15"}]},
    { name:"Legs", focus:"Beine · Bauch", ex:[{mg:"Beine",n:"Kniebeugen",sets:4,reps:"8-10"},{mg:"Beine",n:"Beinpresse",sets:3,reps:"12-15"},{mg:"Beine",n:"Rumänisches Kreuzheben",sets:3,reps:"10-12"},{mg:"Beine",n:"Beinbeuger",sets:3,reps:"12-15"},{mg:"Beine",n:"Wadenheben",sets:4,reps:"20-25"}]},
  ]},

const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const calc1RM = (kg, reps) => reps <= 0 ? 0 : reps === 1 ? kg : Math.round(kg * (1 + reps / 30));
const pct = (v, max) => `${Math.min(100, Math.round((v / (max || 1)) * 100))}%`;

async function askClaude(system, content, isVision = false) {
  const apiKey = localStorage.getItem('fitpro_api_key') || '';
  if (!apiKey) throw new Error('NO_API_KEY');
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1200,
      system,
      messages: [{ role: "user", content: isVision ? content : [{ type: "text", text: content }] }],
    }),
  });
  if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(e?.error?.message || r.status); }
  const d = await r.json();
  return d.content?.map(b => b.text || "").join("") || "";
}

function parseJSON(txt) {
  try { return JSON.parse(txt.replace(/```json|```/g, "").trim()); }
  catch { return null; }
}
