            <span className="hi-ic">{todayH[h.id]?"✅":h.i}</span>
            <div className="hi-lb">{h.l}</div>
          </div>
        ))}
      </div>

      {/* Quick actions */}
      <div className="sec">Schnellzugriff</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,padding:"0 14px 4px"}}>
        {[["🏋️","Workout starten","training","var(--g)"],
          ["📸","Mahlzeit tracken","nutrition","var(--o)"],
          ["🤖","AI Coach","ai","var(--p)"],
          ["📊","Fortschritt","stats","var(--cy)"]].map(([ic,lb,tb,c])=>(
          <button key={lb} onClick={()=>setTab(tb)}
            style={{background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:15,padding:"15px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:7,transition:"all .16s"}}>
            <span style={{fontSize:26}}>{ic}</span>
            <span style={{fontSize:11,fontWeight:700,color:c}}>{lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TRAINING
═══════════════════════════════════════════ */
function Training({ workouts, setWorkouts, doms, setDoms, addXP }) {
  const [sub, setSub]           = useState("kraft");
  const [active, setActive]     = useState(null);
  const [timer, setTimer]       = useState(0);
  const [running, setRunning]   = useState(false);
  const [rest, setRest]         = useState(null);
  const [restDur, setRestDur]   = useState(90);
  const [newEx, setNewEx]       = useState({ mg:"Brust", name:"", sets:[], note:"", isSuper:false });
  const [showTmpl, setShowTmpl] = useState(false);
  const [cardioF, setCardioF]   = useState({ act:"Laufen", dur:"", dist:"", hr:"" });
  const [cardios, setCardios]   = useState([]);
  const [mobDone, setMobDone]   = useState([]);
  const [libQ, setLibQ]         = useState("");
  const [sessNote, setSessNote] = useState("");
  const [editWo, setEditWo]     = useState(null);   // workout being edited (copy)
  const [delConfirm, setDelConfirm] = useState(null); // workout id to confirm delete
  const timerRef = useRef();
  const restRef  = useRef();

  // ── Edit helpers ──────────────────────────────
  const openEdit  = (w) => setEditWo(JSON.parse(JSON.stringify(w))); // deep copy
  const closeEdit = ()  => setEditWo(null);

  const saveEdit  = () => {
    const vol  = editWo.exercises.reduce((s,e)=>s+e.sets.reduce((a,st)=>a+((Number(st.kg)||0)*(Number(st.reps)||0)),0),0);
    const sets = editWo.exercises.reduce((s,e)=>s+e.sets.length,0);
    setWorkouts(ws => ws.map(w => w.id === editWo.id ? { ...editWo, volume:vol, totalSets:sets } : w));
    setEditWo(null);
  };

  // edit: workout name / date / note
  const updEditField = (field, val) => setEditWo(w => ({ ...w, [field]: val }));

  // edit: a set inside the edited workout
  const updEditSet = (ei, si, field, val) =>
    setEditWo(w => ({
      ...w,
      exercises: w.exercises.map((ex,i) => i!==ei ? ex : {
        ...ex,
        sets: ex.sets.map((s,j) => j!==si ? s : { ...s, [field]: val }),
      }),
    }));

  // edit: delete one set
  const delEditSet = (ei, si) =>
    setEditWo(w => ({
      ...w,
      exercises: w.exercises.map((ex,i) => i!==ei ? ex : {
        ...ex, sets: ex.sets.filter((_,j) => j!==si),
      }),
    }));

  // edit: add set to exercise
  const addEditSet = (ei) =>
    setEditWo(w => ({
      ...w,
      exercises: w.exercises.map((ex,i) => i!==ei ? ex : {
        ...ex, sets: [...ex.sets, { kg:"", reps:"", rir:"", done:false }],
      }),
    }));

  // edit: delete entire exercise
  const delEditEx = (ei) =>
    setEditWo(w => ({ ...w, exercises: w.exercises.filter((_,i) => i!==ei) }));

  // edit: move exercise up/down
  const moveEditEx = (ei, dir) => {
    const arr = [...editWo.exercises];
    const to  = ei + dir;
    if (to < 0 || to >= arr.length) return;
    [arr[ei], arr[to]] = [arr[to], arr[ei]];
    setEditWo(w => ({ ...w, exercises: arr }));
  };

  // ── Delete workout ─────────────────────────────
  const deleteWorkout = (id) => {
    setWorkouts(ws => ws.filter(w => w.id !== id));
    setDelConfirm(null);
  };

  useEffect(() => {
    if (running) { timerRef.current = setInterval(() => setTimer(t => t + 1), 1000); }
    else { clearInterval(timerRef.current); }
    return () => clearInterval(timerRef.current);
  }, [running]);

  useEffect(() => {
    if (rest !== null && rest > 0) { restRef.current = setTimeout(() => setRest(r => r - 1), 1000); }
    else if (rest === 0)           { setRest(null); }
    return () => clearTimeout(restRef.current);
  }, [rest]);

  // find previous best set for an exercise name
  const prevBest = useCallback((name) => {
    for (const w of workouts) {
      const ex = w.exercises?.find(e => e.name === name);
      if (ex?.sets?.length) {
        return ex.sets.reduce((b, s) =>
          (Number(s.kg)||0) > (Number(b.kg)||0) ? s : b, ex.sets[0]);
      }
    }
    return null;
  }, [workouts]);

  const getSuggest = useCallback((name) => {
    const pb = prevBest(name);
    if (!pb || !Number(pb.kg)) return null;
    const next = (Math.ceil(Number(pb.kg) / 2.5 + 0.4) * 2.5).toFixed(1);
    return { kg: next, reps: pb.reps || "8", note: `+2.5kg vs. letzter Session` };
  }, [prevBest]);

  const startWorkout = () => {
    setActive({ id:Date.now(), date:new Date().toLocaleDateString("de"), name:"Workout "+(workouts.length+1), exercises:[] });
    setTimer(0); setRunning(true); setSessNote("");
  };

  const fromTemplate = (tmpl, day) => {
    const exs = day.ex.map(e => ({
      mg: e.mg, name: e.n, isSuper: false, note: "",
      sets: Array.from({ length: e.sets }, () => ({ kg:"", reps: e.reps.split("-")[0]||"8", rir:"", done:false })),
    }));
    setActive({ id:Date.now(), date:new Date().toLocaleDateString("de"), name:`${tmpl.name} – ${day.name}`, exercises: exs });
    setTimer(0); setRunning(true); setShowTmpl(false); setSessNote("");
  };

  // Update a set in the "new exercise" form
  const updNewSet = (i, field, val) =>
    setNewEx(e => ({ ...e, sets: e.sets.map((s, j) => j === i ? { ...s, [field]: val } : s) }));

  // Toggle done on new exercise form set
  const toggleNewSet = (i) => {
    if (!newEx.sets[i].done) setRest(restDur);
    setNewEx(e => ({ ...e, sets: e.sets.map((s, j) => j === i ? { ...s, done: !s.done } : s) }));
  };

  // Update a set in an already-added exercise (in active workout)
  const updActiveSet = (ei, si, field, val) =>
    setActive(a => ({
      ...a,
      exercises: a.exercises.map((ex, idx) => idx !== ei ? ex : {
        ...ex,
        sets: ex.sets.map((s, j) => j !== si ? s : { ...s, [field]: val }),
      }),
    }));

  const toggleActiveSet = (ei, si) => {
    const already = active.exercises[ei].sets[si].done;
    if (!already) setRest(restDur);
    setActive(a => ({
      ...a,
      exercises: a.exercises.map((ex, idx) => idx !== ei ? ex : {
        ...ex,
        sets: ex.sets.map((s, j) => j !== si ? s : { ...s, done: !s.done }),
      }),
    }));
  };

  const addExercise = () => {
    if (!newEx.name) return;
    setActive(a => ({ ...a, exercises: [...a.exercises, { ...newEx }] }));
    setNewEx({ mg:"Brust", name:"", sets:[], note:"", isSuper:false });
  };

  const finishWorkout = () => {
    const totalVol  = active.exercises.reduce((s,e)=>s+e.sets.reduce((a,st)=>a+((Number(st.kg)||0)*(Number(st.reps)||0)),0),0);
    const totalSets = active.exercises.reduce((s,e)=>s+e.sets.length, 0);
    setWorkouts(w => [{ ...active, duration:timer, note:sessNote, volume:totalVol, totalSets }, ...w]);
    setActive(null); setRunning(false); setTimer(0);
    addXP(100);
  };

  const saveCardio = () => {
    if (!cardioF.dur) return;
    setCardios(c => [{ ...cardioF, date:new Date().toLocaleDateString("de"), id:Date.now(), cal:Math.round(Number(cardioF.dur)*8) }, ...c]);
    setCardioF({ act:"Laufen", dur:"", dist:"", hr:"" });
    addXP(50);
  };

  const suggest = newEx.name ? getSuggest(newEx.name) : null;
  const libExs  = ALL_EXERCISES.filter(e => !libQ || e.n.toLowerCase().includes(libQ.toLowerCase()) || e.mg.toLowerCase().includes(libQ.toLowerCase()));

  return (
    <div>
      <div className="hdr">
        <div className="ht">TRAINING</div>
        {running && (
          <div className="ac">
            <div style={{width:7,height:7,borderRadius:"50%",background:"var(--ok)"}} className="pulse"/>
            <span style={{fontFamily:"var(--fh)",fontSize:22,fontWeight:900,color:"var(--g)"}}>{fmtTime(timer)}</span>
          </div>
        )}
      </div>

      <div className="stabs">
        {[["kraft","🏋️ Kraft"],["cardio","❤️ Cardio"],["mobility","🧘 Mobility"],["doms","🩹 Recovery"],["lib","📚 Bibliothek"]].map(([id,l])=>(
          <div key={id} className={`stab${sub===id?" on":""}`} onClick={()=>setSub(id)}>{l}</div>
        ))}
      </div>

      {/* REST TIMER */}
      {rest !== null && !editWo && (
        <div className="rt-wrap">
          <span style={{fontSize:24}}>⏱️</span>
          <div>
            <div style={{fontSize:9,color:"var(--mu)",fontWeight:700}}>PAUSE-TIMER</div>
            <div style={{fontFamily:"var(--fh)",fontSize:28,fontWeight:900,color:"var(--g)",lineHeight:1}}>{fmtTime(rest)}</div>
          </div>
          <div className="f1"><div className="pb"><div className="pf" style={{width:pct(rest,restDur),background:"var(--g)"}}/></div></div>
          <button onClick={()=>setRest(null)} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,padding:"7px 11px",color:"var(--tx)",cursor:"pointer",fontSize:12,fontWeight:700}}>Skip</button>
        </div>
      )}

      {/* ── KRAFT ── */}
      {sub === "kraft" && !active && !editWo && (
        <>
          <div className="card" style={{background:"linear-gradient(135deg,#122012,#0a130a)",borderColor:"rgba(0,230,118,.15)"}}>
            <div style={{fontFamily:"var(--fh)",fontSize:22,fontWeight:900,color:"var(--ok)",marginBottom:5}}>READY TO LIFT? 💪</div>
            <p style={{fontSize:13,color:"var(--mu)",marginBottom:13}}>Starte freestyle oder wähle ein Template.</p>
            <div className="row">
              <button className="btn btg f1" onClick={startWorkout}>⚡ Freestyle</button>
              <button className="btn btgh f1" onClick={()=>setShowTmpl(s=>!s)}>📋 Templates</button>
            </div>
          </div>

          {showTmpl && (
            <>
              <div className="sec">WORKOUT-TEMPLATES</div>
              {TEMPLATES.map((t, ti) => (
                <div key={ti} className="card">
                  <div className="jb" style={{marginBottom:9}}>
                    <span style={{fontWeight:700,fontSize:14}}>{t.icon} {t.name}</span>
                    <span className="tag tp">{t.days.length} Tage</span>
                  </div>
                  {t.days.map((d, di) => (
                    <div key={di} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid var(--bd)"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{d.name}</div>
                        <div style={{fontSize:11,color:"var(--mu)"}}>{d.focus}</div>
                      </div>
                      <button className="btn btg btxs" onClick={()=>fromTemplate(t,d)}>Starten</button>
                    </div>
                  ))}
                </div>
              ))}
            </>
          )}

          <div className="sec">LETZTE WORKOUTS</div>
          {workouts.length === 0 && <div className="empty"><span className="empty-ic">🏋️</span><p style={{color:"var(--mu)"}}>Noch kein Workout – leg los!</p></div>}
          {workouts.map((w, i) => (
            <div key={w.id||i} className="card">
              {/* Delete confirmation bar */}
              {delConfirm === (w.id||i) && (
                <div className="confirm-bar" style={{marginBottom:10,margin:"0 0 10px"}}>
                  <span style={{fontSize:13,fontWeight:600}}>Workout wirklich löschen?</span>
                  <div className="row" style={{gap:6}}>
                    <button onClick={()=>setDelConfirm(null)} className="btn btgh" style={{padding:"6px 12px",fontSize:12}}>Abbrechen</button>
                    <button onClick={()=>deleteWorkout(w.id||i)} style={{background:"var(--er)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Löschen</button>
                  </div>
                </div>
              )}

              <div className="jb" style={{marginBottom:6}}>
                <div>
                  <div style={{fontWeight:700}}>{w.name}</div>
                  <div style={{fontSize:11,color:"var(--mu)"}}>{w.date} · {fmtTime(w.duration||0)}</div>
                </div>
                <div className="row" style={{gap:5}}>
                  <button className="edit-btn" onClick={()=>openEdit(w)}>✏️ Bearbeiten</button>
                  <button className="del-btn"  onClick={()=>setDelConfirm(delConfirm===(w.id||i)?null:(w.id||i))}>🗑️</button>
                </div>
              </div>
              <div className="row" style={{gap:5,flexWrap:"wrap",marginBottom:6}}>
                <span className="tag tg">{w.exercises?.length||0} Übungen</span>
                {w.totalSets > 0 && <span className="tag tp">{w.totalSets} Sätze</span>}
                {w.volume > 0 && <span className="tag tam">📦 {(w.volume/1000).toFixed(1)}t</span>}
              </div>
              {w.exercises?.map((ex, j) => (
                <div key={j} style={{padding:"5px 0",borderTop:"1px solid var(--bd)",fontSize:12,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontWeight:600}}>{ex.isSuper?"⚡":""}{ex.name}</span>
                  <span style={{color:"var(--mu)"}}>{ex.sets?.length}×{ex.sets?.[0]?.reps||"?"} @ {ex.sets?.[0]?.kg||"?"}kg</span>
                </div>
              ))}
              {w.note && <div style={{marginTop:7,fontSize:11,color:"var(--mu)",fontStyle:"italic"}}>📝 {w.note}</div>}
            </div>
          ))}
        </>
      )}

      {/* ══ EDIT WORKOUT VIEW ══ */}
      {sub === "kraft" && editWo && (
        <>
          {/* Sticky header */}
          <div style={{position:"sticky",top:0,zIndex:60,background:"var(--bg)",padding:"8px 14px 10px",borderBottom:"1px solid var(--bd)",backdropFilter:"blur(8px)"}}>
            <div className="jb">
              <div>
                <div style={{fontSize:10,color:"var(--mu)",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Workout bearbeiten</div>
                <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--p)",lineHeight:1.1}}>{editWo.name}</div>
              </div>
              <div className="row" style={{gap:7}}>
                <button className="btn btgh btsm" style={{width:"auto"}} onClick={closeEdit}>Abbrechen</button>
                <button className="btn btg  btsm" style={{width:"auto"}} onClick={saveEdit}>Speichern ✓</button>
              </div>
            </div>
          </div>

          {/* Workout meta */}
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:14,fontWeight:900,color:"var(--g)",marginBottom:11}}>WORKOUT-INFO</div>
            <div className="g8">
              <div><label className="lbl">Name</label><input className="inp" value={editWo.name} onChange={e=>updEditField("name",e.target.value)}/></div>
              <div><label className="lbl">Datum</label><input className="inp" value={editWo.date} onChange={e=>updEditField("date",e.target.value)}/></div>
              <div><label className="lbl">Notiz</label><input className="inp" placeholder="Session-Notiz…" value={editWo.note||""} onChange={e=>updEditField("note",e.target.value)}/></div>
            </div>
          </div>

          {/* Each exercise */}
          {editWo.exercises.map((ex, ei) => (
            <div key={ei} className="card">

              {/* Exercise header */}
              <div className="ex-hdr">
                <div className="ac">
                  <span style={{fontSize:18}}>{MG[ex.mg]?.icon||"💪"}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{ex.name}</div>
                    <div style={{fontSize:10,color:"var(--mu)"}}>{ex.mg} · {ex.sets.length} Sätze</div>
                  </div>
                </div>
                <div className="row" style={{gap:5}}>
                  <button onClick={()=>moveEditEx(ei,-1)} disabled={ei===0}
                    style={{background:"rgba(255,255,255,.07)",border:"1px solid var(--bd)",borderRadius:7,padding:"5px 8px",color:ei===0?"var(--mu)":"var(--tx)",cursor:ei===0?"default":"pointer",fontSize:12}}>↑</button>
                  <button onClick={()=>moveEditEx(ei,+1)} disabled={ei===editWo.exercises.length-1}
                    style={{background:"rgba(255,255,255,.07)",border:"1px solid var(--bd)",borderRadius:7,padding:"5px 8px",color:ei===editWo.exercises.length-1?"var(--mu)":"var(--tx)",cursor:ei===editWo.exercises.length-1?"default":"pointer",fontSize:12}}>↓</button>
                  <button className="del-btn" onClick={()=>delEditEx(ei)}>✕ Löschen</button>
                </div>
              </div>

              {/* Set headers */}
              <div style={{display:"grid",gridTemplateColumns:"26px 1fr 1fr 52px 26px 26px",gap:4,marginBottom:4}}>
                <span className="lbl">#</span>
                <span className="lbl">KG</span>
                <span className="lbl">Wdh.</span>
                <span className="lbl">RIR</span>
                <span/>
                <span/>
              </div>

              {/* Sets */}
              {ex.sets.map((s, si) => (
                <div key={si} className="del-row">
                  <span className="sn">{si+1}</span>
                  <input className="inp" type="number" placeholder="kg"   style={{padding:"7px 7px",fontSize:12}} value={s.kg}   onChange={e=>updEditSet(ei,si,"kg",  e.target.value)}/>
                  <input className="inp" type="number" placeholder="Wdh." style={{padding:"7px 7px",fontSize:12}} value={s.reps} onChange={e=>updEditSet(ei,si,"reps",e.target.value)}/>
                  <input className="inp" type="number" placeholder="RIR"  style={{padding:"7px 7px",fontSize:12}} value={s.rir}  onChange={e=>updEditSet(ei,si,"rir", e.target.value)}/>
                  {/* done toggle */}
                  <button className={`schk${s.done?" done":""}`} style={{width:26,height:26,borderRadius:6,fontSize:12}}
                    onClick={()=>updEditSet(ei,si,"done",!s.done)}>✓</button>
                  {/* delete set */}
                  <button onClick={()=>delEditSet(ei,si)}
                    style={{width:26,height:26,borderRadius:6,background:"rgba(255,71,87,.15)",border:"1px solid rgba(255,71,87,.25)",color:"var(--er)",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>
              ))}

              {/* Add set */}
              <button className="btn btgh btsm" style={{marginTop:10,fontSize:12}}
                onClick={()=>addEditSet(ei)}>+ Satz hinzufügen</button>
            </div>
          ))}

          {/* Summary + save */}
          <div className="card" style={{background:"linear-gradient(135deg,#101028,#0c1020)",borderColor:"rgba(123,97,255,.18)"}}>
            <div className="jb" style={{marginBottom:11}}>
              <div style={{fontSize:13,color:"var(--mu)"}}>Gesamt</div>
              <div className="row" style={{gap:6}}>
                <span className="tag tp">{editWo.exercises.length} Übungen</span>
                <span className="tag tg">{editWo.exercises.reduce((s,e)=>s+e.sets.length,0)} Sätze</span>
              </div>
            </div>
            <div className="row" style={{gap:8}}>
              <button className="btn btgh f1" onClick={closeEdit}>Abbrechen</button>
              <button className="btn btg  f1" onClick={saveEdit}>✓ Änderungen speichern</button>
            </div>
          </div>
        </>
      )}

      {/* Active workout */}
      {sub === "kraft" && active && (
        <>
          {/* Already-added exercises – fully editable */}
          {active.exercises.map((ex, ei) => (
            <div key={ei} className="card">
              <div className="jb" style={{marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:14}}>{ex.isSuper && <span style={{color:"var(--cy)"}}>⚡ </span>}{ex.name}</span>
                <div className="row" style={{gap:5}}>
                  <span className="tag tp">{ex.mg}</span>
                  <span className="tag ts">{ex.sets.filter(s=>s.done).length}/{ex.sets.length}</span>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"26px 1fr 1fr 56px 30px",gap:4,marginBottom:4}}>
                <span className="lbl">#</span><span className="lbl">KG</span><span className="lbl">Wdh.</span><span className="lbl">RIR</span><span/>
              </div>
              {ex.sets.map((s, si) => (
                <div key={si} className="srow" style={{background:s.done?"rgba(200,255,0,.04)":"transparent",borderRadius:6,padding:"6px 3px"}}>
                  <span className={`sn${s.done?" done":""}`}>{si+1}</span>
                  <input className="inp" style={{padding:"7px 7px",fontSize:12,borderColor:s.done?"rgba(200,255,0,.3)":""}} type="number" placeholder="kg" value={s.kg}
                    onChange={e=>updActiveSet(ei,si,"kg",e.target.value)}/>
                  <input className="inp" style={{padding:"7px 7px",fontSize:12,borderColor:s.done?"rgba(200,255,0,.3)":""}} type="number" placeholder="Wdh." value={s.reps}
                    onChange={e=>updActiveSet(ei,si,"reps",e.target.value)}/>
                  <input className="inp" style={{padding:"7px 7px",fontSize:12}} type="number" placeholder="RIR" value={s.rir}
                    onChange={e=>updActiveSet(ei,si,"rir",e.target.value)}/>
                  <button className={`schk${s.done?" done":""}`} onClick={()=>toggleActiveSet(ei,si)}>✓</button>
                </div>
              ))}
            </div>
          ))}

          {/* New exercise form */}
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--g)",marginBottom:11}}>ÜBUNG HINZUFÜGEN</div>
            <div className="g12">
              <div className="row">
                <div className="f1">
                  <label className="lbl">Muskelgruppe</label>
                  <select className="sel" value={newEx.mg} onChange={e=>setNewEx(x=>({...x,mg:e.target.value,name:""}))}>
                    {Object.keys(MG).map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,paddingTop:18,flexShrink:0}}>
                  <span style={{fontSize:10,color:"var(--mu)",fontWeight:700}}>Super</span>
                  <div onClick={()=>setNewEx(x=>({...x,isSuper:!x.isSuper}))} style={{width:34,height:19,borderRadius:99,background:newEx.isSuper?"var(--cy)":"rgba(255,255,255,.1)",position:"relative",cursor:"pointer",transition:"background .2s"}}>
                    <div style={{position:"absolute",top:2,left:newEx.isSuper?15:2,width:15,height:15,borderRadius:"50%",background:"white",transition:"left .2s"}}/>
                  </div>
                </div>
              </div>

              <div>
                <label className="lbl">Übung</label>
                <select className="sel" value={newEx.name} onChange={e=>setNewEx(x=>({...x,name:e.target.value}))}>
                  <option value="">Wählen…</option>
                  {MG[newEx.mg]?.ex.map(x=><option key={x}>{x}</option>)}
                </select>
              </div>

              {/* Progressive Overload Suggestion */}
              {suggest && (
                <div className="pr-badge">
                  <span style={{fontSize:18}}>📈</span>
                  <div>
                    <div style={{fontSize:10,color:"var(--g)",fontWeight:700}}>PROGRESSIVE OVERLOAD</div>
                    <div style={{fontSize:12,color:"var(--mu)"}}>{suggest.kg}kg × {suggest.reps} Wdh. ({suggest.note})</div>
                  </div>
                </div>
              )}

              {/* Rest timer selector */}
              <div>
                <label className="lbl">Pause-Timer</label>
                <div className="row">
                  {[60,90,120,180].map(s=>(
                    <button key={s} onClick={()=>setRestDur(s)} style={{flex:1,padding:"7px 4px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",border:`1px solid ${restDur===s?"var(--g)":"var(--bd)"}`,background:restDur===s?"rgba(200,255,0,.12)":"var(--s3)",color:restDur===s?"var(--g)":"var(--mu)",transition:"all .16s"}}>{s}s</button>
                  ))}
                </div>
              </div>

              {/* Sets for new exercise */}
              {newEx.sets.length > 0 && (
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"26px 1fr 1fr 56px 30px",gap:4,marginBottom:4}}>
                    <span className="lbl">#</span><span className="lbl">KG</span><span className="lbl">Wdh.</span><span className="lbl">RIR</span><span/>
                  </div>
                  {newEx.sets.map((s, i) => (
                    <div key={i} className="srow" style={{background:s.done?"rgba(200,255,0,.04)":"transparent",borderRadius:6,padding:"6px 3px"}}>
                      <span className={`sn${s.done?" done":""}`}>{i+1}</span>
                      <input className="inp" style={{padding:"7px 7px",fontSize:12}} type="number" placeholder={suggest?.kg||"0"} value={s.kg}   onChange={e=>updNewSet(i,"kg",e.target.value)}/>
                      <input className="inp" style={{padding:"7px 7px",fontSize:12}} type="number" placeholder={suggest?.reps||"8"} value={s.reps} onChange={e=>updNewSet(i,"reps",e.target.value)}/>
                      <input className="inp" style={{padding:"7px 7px",fontSize:12}} type="number" placeholder="RIR" value={s.rir} onChange={e=>updNewSet(i,"rir",e.target.value)}/>
                      <button className={`schk${s.done?" done":""}`} onClick={()=>toggleNewSet(i)}>✓</button>
                    </div>
                  ))}
                </div>
              )}

              <div>
                <label className="lbl">Notiz (optional)</label>
                <input className="inp" placeholder="Technik-Hinweis, Schwierigkeit…" value={newEx.note} onChange={e=>setNewEx(x=>({...x,note:e.target.value}))}/>
              </div>

              <div className="row">
                <button className="btn btgh f1" onClick={()=>setNewEx(e=>({...e,sets:[...e.sets,{kg:"",reps:"",rir:"",done:false}]}))}>+ Satz</button>
                <button className="btn btg f1"  onClick={addExercise} disabled={!newEx.name}>Hinzufügen ✓</button>
              </div>
            </div>
          </div>

          <div className="card">
            <label className="lbl">Session-Notiz</label>
            <input className="inp" placeholder="Energie, Schlaf, Besonderheiten…" value={sessNote} onChange={e=>setSessNote(e.target.value)}/>
          </div>
          <div style={{padding:"0 14px 4px"}}>
            <button className="btn bto" onClick={finishWorkout}>🏁 Workout abschließen</button>
          </div>
        </>
      )}

      {/* ── CARDIO ── */}
      {sub === "cardio" && (
        <>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--o)",marginBottom:11}}>CARDIO TRACKEN</div>
            <div className="g12">
              <div>
                <label className="lbl">Aktivität</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {CARDIO_LIST.map(a=>(
                    <button key={a.n} onClick={()=>setCardioF(f=>({...f,act:a.n}))} style={{padding:"6px 11px",borderRadius:99,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${cardioF.act===a.n?"var(--o)":"var(--bd)"}`,background:cardioF.act===a.n?"rgba(255,107,53,.15)":"var(--s2)",color:cardioF.act===a.n?"var(--o)":"var(--mu)",transition:"all .16s"}}>
                      {a.i} {a.n}
                    </button>
                  ))}
                </div>
              </div>
              <div className="row">
                <div className="f1"><label className="lbl">Dauer (Min)</label><input className="inp" type="number" placeholder="30" value={cardioF.dur} onChange={e=>setCardioF(f=>({...f,dur:e.target.value}))}/></div>
                <div className="f1"><label className="lbl">Distanz</label><input className="inp" type="number" placeholder="0" value={cardioF.dist} onChange={e=>setCardioF(f=>({...f,dist:e.target.value}))}/></div>
                <div className="f1"><label className="lbl">Ø HF (bpm)</label><input className="inp" type="number" placeholder="150" value={cardioF.hr} onChange={e=>setCardioF(f=>({...f,hr:e.target.value}))}/></div>
              </div>
              <button className="btn bto" onClick={saveCardio} disabled={!cardioF.dur}>❤️ Session speichern</button>
            </div>
          </div>
          {cardios.length === 0 && <div className="empty"><span className="empty-ic">❤️</span><p style={{color:"var(--mu)"}}>Noch keine Cardio-Session</p></div>}
          {cardios.map((c,i)=>(
            <div key={i} className="card" style={{padding:"13px 16px"}}>
              <div className="jb">
                <div className="ac">
                  <span style={{fontSize:22}}>{CARDIO_LIST.find(a=>a.n===c.act)?.i||"❤️"}</span>
                  <div><div style={{fontWeight:700}}>{c.act}</div><div style={{fontSize:11,color:"var(--mu)"}}>{c.date}</div></div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--o)"}}>{c.dur} Min</div>
                  {c.dist && <div style={{fontSize:11,color:"var(--mu)"}}>{c.dist} {CARDIO_LIST.find(a=>a.n===c.act)?.u}</div>}
                </div>
              </div>
              <div style={{marginTop:7,display:"flex",gap:5,flexWrap:"wrap"}}>
                <span className="tag tg">~{c.cal} kcal</span>
                {c.hr && <span className="tag to">❤️ Ø {c.hr} bpm</span>}
              </div>
            </div>
          ))}
        </>
      )}

      {/* ── MOBILITY ── */}
      {sub === "mobility" && MOBILITY.map((r,i)=>(
        <div key={i} className="card">
          <div className="jb" style={{marginBottom:9}}>
            <div className="ac">
              <span style={{fontSize:24}}>{r.i}</span>
              <div><div style={{fontWeight:700,fontSize:14}}>{r.n}</div><div style={{fontSize:11,color:"var(--mu)"}}>{r.dur}</div></div>
            </div>
            <button className={`btn btsm${mobDone.includes(i)?" btg":" btgh"}`} style={{width:"auto"}}
              onClick={()=>{setMobDone(d=>d.includes(i)?d.filter(x=>x!==i):[...d,i]);if(!mobDone.includes(i))addXP(30);}}>
              {mobDone.includes(i)?"✓ Fertig":"Starten"}
            </button>
          </div>
          {r.ex.map((e,j)=>(
            <div key={j} style={{padding:"7px 0",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}}>
              <span><strong>{e.n}</strong><span style={{color:"var(--mu)",marginLeft:6}}>– {e.d}</span></span>
              <span className="tag tp" style={{fontSize:9,flexShrink:0,marginLeft:6}}>{e.s}</span>
            </div>
          ))}
        </div>
      ))}

      {/* ── DOMS ── */}
      {sub === "doms" && (
        <>
          <div className="card" style={{background:"linear-gradient(135deg,#1a1010,#100e1a)",borderColor:"rgba(255,107,53,.15)",marginBottom:10}}>
            <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--o)"}}>MUSKELKATER TRACKER</div>
            <p style={{fontSize:13,color:"var(--mu)",marginTop:4}}>Tap um deinen Kater einzustufen. Beeinflusst den Recovery-Score.</p>
          </div>
          <div className="dgrid">
            {Object.entries(MG).map(([mg,{icon,color}])=>{
              const lv = doms[mg]||0;
              return (
                <div key={mg} className={`di${lv>0?" l"+lv:""}`} onClick={()=>setDoms(d=>({...d,[mg]:(lv+1)%5}))}>
                  <span style={{fontSize:22,display:"block",marginBottom:3}}>{icon}</span>
                  <div style={{fontWeight:700,fontSize:13}}>{mg}</div>
                  <div style={{fontSize:10,color:"var(--mu)",marginTop:2}}>{DOMS_LBL[lv]}</div>
                  <div style={{marginTop:6,display:"flex",justifyContent:"center",gap:3}}>
                    {[0,1,2,3,4].map(n=><div key={n} style={{width:6,height:6,borderRadius:3,background:n<=lv?color:"rgba(255,255,255,.1)",transition:"background .2s"}}/>)}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── BIBLIOTHEK ── */}
      {sub === "lib" && (
        <>
          <div style={{padding:"0 14px",marginBottom:9}}>
            <input className="inp" placeholder="🔍 Übung oder Muskelgruppe suchen…" value={libQ} onChange={e=>setLibQ(e.target.value)}/>
          </div>
          {libQ ? (
            <>
              <div className="sec">ERGEBNISSE ({libExs.length})</div>
              {libExs.map((e,i)=>(
                <div key={i} style={{margin:"0 14px 6px",padding:"11px 14px",background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:11,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{e.n}</div>
                    <div style={{fontSize:10,color:"var(--mu)"}}>{e.mg}</div>
                  </div>
                  <span style={{fontSize:18}}>{e.icon}</span>
                </div>
              ))}
            </>
          ) : Object.entries(MG).map(([mg,{icon,color,ex}])=>(
            <div key={mg}>
              <div className="sec" style={{color}}>{icon} {mg}</div>
              {ex.map((e,i)=>(
                <div key={i} style={{margin:"0 14px 5px",padding:"10px 14px",background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:11,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:600,fontSize:13}}>{e}</span>
                  <span style={{fontSize:16}}>{icon}</span>
                </div>
              ))}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   NUTRITION
═══════════════════════════════════════════ */
function Nutrition({ meals, setMeals, water, setWater, addXP, profile }) {
  const [sub,        setSub]        = useState("track");
  const [photo,      setPhoto]      = useState(null);
  const [b64,        setB64]        = useState(null);
  const [mealType,   setMealType]   = useState("Frühstück");
  const [loading,    setLoading]    = useState(false);
  const [result,     setResult]     = useState(null);
  const [analyzeErr, setAnalyzeErr] = useState(false);
  const [manual,     setManual]     = useState({ name:"", calories:"", protein:"", carbs:"", fat:"" });
  const [mealPlan,   setMealPlan]   = useState(null);
  const [planLoad,   setPlanLoad]   = useState(false);
  const [planErr,    setPlanErr]    = useState(false);
  const [macroG,     setMacroG]     = useState({
    cal: profile.weight ? Math.round(Number(profile.weight)*32) : 2800,
    p:   Math.round((Number(profile.weight)||80) * 2),
    c:   300, f: 80,
  });
  const fileRef = useRef();

  const totCal = meals.reduce((s,m)=>s+(Number(m.calories)||0),0);
  const totP   = meals.reduce((s,m)=>s+(Number(m.protein)||0),0);
  const totC   = meals.reduce((s,m)=>s+(Number(m.carbs)||0),0);
  const totF   = meals.reduce((s,m)=>s+(Number(m.fat)||0),0);

  const analyze = async () => {
    if (!b64) return;
    setLoading(true); setResult(null); setAnalyzeErr(false);
    try {
      const txt = await askClaude("Du bist Ernährungsexperte. Antworte NUR mit validem JSON, kein Markdown, keine Erklärungen.",
        [{ type:"image", source:{ type:"base64", media_type:"image/jpeg", data:b64 } },
         { type:"text",  text:'Analysiere das Essen auf dem Foto. JSON: {"name":"...","calories":Zahl,"protein":Zahl,"carbs":Zahl,"fat":Zahl,"info":"kurze Beschreibung DE","tip":"Ernährungstipp DE","quality":"gut|okay|schlecht"}' }], true);
      const parsed = parseJSON(txt);
      if (parsed) { setResult(parsed); addXP(25); }
      else { setAnalyzeErr(true); }
    } catch { setAnalyzeErr(true); }
    setLoading(false);
  };

  const saveMeal = (data) => {
    setMeals(m => [{ ...data, type:mealType, time:new Date().toLocaleTimeString("de",{hour:"2-digit",minute:"2-digit"}), id:Date.now() }, ...m]);
    setPhoto(null); setB64(null); setResult(null);
    setManual({ name:"", calories:"", protein:"", carbs:"", fat:"" });
    addXP(15);
  };

  const genMealPlan = async () => {
    setPlanLoad(true); setMealPlan(null); setPlanErr(false);
    try {
      const txt = await askClaude("Du bist Ernährungsexperte. Nur JSON, kein Markdown.",
        `7-Tage-Ernährungsplan: Ziel=${profile.goal||"Muskelaufbau"}, Kalorien=${macroG.cal}kcal, Protein=${macroG.p}g. Antwort als JSON: {"days":[{"day":"Montag","meals":[{"type":"Frühstück","name":"...","cal":Zahl,"p":Zahl,"c":Zahl,"f":Zahl},{"type":"Mittagessen","name":"...","cal":Zahl,"p":Zahl,"c":Zahl,"f":Zahl},{"type":"Abendessen","name":"...","cal":Zahl,"p":Zahl,"c":Zahl,"f":Zahl},{"type":"Snack","name":"...","cal":Zahl,"p":Zahl,"c":Zahl,"f":Zahl}],"totalCal":Zahl}],"tip":"..."}`);
      const parsed = parseJSON(txt);
      if (parsed) { setMealPlan(parsed); addXP(50); }
      else { setPlanErr(true); }
    } catch { setPlanErr(true); }
    setPlanLoad(false);
  };

  // BMR/TDEE calculations
  const { bmr, tdee } = useMemo(() => {
    const w = Number(profile.weight)||0, h = Number(profile.height)||0, a = Number(profile.age)||25;
    if (!w || !h) return { bmr:0, tdee:0 };
    const b = Math.round(88.362 + 13.397*w + 4.799*h - 5.677*a);
    return { bmr: b, tdee: Math.round(b * 1.55) };
  }, [profile]);

  return (
    <div>
      <div className="hdr"><div className="ht">ERNÄHRUNG</div><span className="tag to">{totCal} kcal</span></div>
      <div className="stabs">
        {[["track","📸 Tracken"],["log","📋 Verlauf"],["water","💧 Wasser"],["plan","🍽️ Wochenplan"],["goals","🎯 Makro-Ziele"]].map(([id,l])=>(
          <div key={id} className={`stab${sub===id?" on":""}`} onClick={()=>setSub(id)}>{l}</div>
        ))}
      </div>

      {/* Macro overview – always visible */}
      <div className="card" style={{background:"linear-gradient(135deg,#1e1208,#10101e)"}}>
        <div className="jb" style={{marginBottom:7}}>
          <span style={{fontFamily:"var(--fh)",fontSize:13,fontWeight:800}}>HEUTE</span>
          <span className="tag tg">{totCal} / {macroG.cal} kcal</span>
        </div>
        <div className="mbar" style={{marginBottom:9}}>
          <div style={{flex:totP||1,background:"var(--g)",borderRadius:99}}/>
          <div style={{flex:totC||1,background:"var(--o)",borderRadius:99}}/>
          <div style={{flex:totF||1,background:"var(--p)",borderRadius:99}}/>
        </div>
        <div className="row" style={{justifyContent:"space-around"}}>
          {[["Protein",totP,macroG.p,"var(--g)"],["Kohlen.",totC,macroG.c,"var(--o)"],["Fett",totF,macroG.f,"var(--p)"]].map(([l,v,g,c])=>(
            <div key={l} style={{textAlign:"center",flex:1}}>
              <div style={{fontFamily:"var(--fh)",fontSize:19,fontWeight:900,color:c}}>{v}g</div>
              <div style={{fontSize:9,color:"var(--mu)",marginBottom:3}}>{l} / {g}g</div>
              <div className="pb" style={{height:4}}><div className="pf" style={{width:pct(v,g),background:c}}/></div>
            </div>
          ))}
        </div>
      </div>

      {/* TRACK */}
      {sub === "track" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--o)",marginBottom:11}}>MAHLZEIT HINZUFÜGEN</div>
          <div className="g12">
            <div>
              <label className="lbl">Mahlzeit</label>
              <select className="sel" value={mealType} onChange={e=>setMealType(e.target.value)}>
                {MEAL_TYPES.map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
            <div className="pbox" onClick={()=>fileRef.current.click()}>
              {photo
                ? <img src={photo} alt="meal"/>
                : <><span style={{fontSize:36}}>📷</span><span style={{fontSize:13,color:"var(--mu)",fontWeight:600}}>Foto aufnehmen / wählen</span><span style={{fontSize:11,color:"var(--mu)",opacity:.7}}>KI erkennt Essen & schätzt Makros</span></>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
              const f=e.target.files[0]; if(!f)return;
              setPhoto(URL.createObjectURL(f)); setResult(null); setAnalyzeErr(false);
              const r=new FileReader(); r.onload=()=>setB64(r.result.split(",")[1]); r.readAsDataURL(f);
            }}/>
            {photo && !result && !analyzeErr && (
              <button className="btn bto" onClick={analyze} disabled={loading}>
                {loading ? <><span className="spin"/> KI analysiert…</> : "🔍 KI-Analyse starten"}
              </button>
            )}
            {analyzeErr && <div style={{fontSize:13,color:"var(--er)",textAlign:"center"}}>⚠️ Analyse fehlgeschlagen – bitte erneut versuchen oder manuell eingeben.</div>}
            {result && (
              <div className="g8">
                <div className="abub">
                  <div className="jb" style={{marginBottom:5}}>
                    <strong style={{color:"var(--g)",fontSize:14}}>{result.name}</strong>
                    {result.quality && <span className={`tag ${result.quality==="gut"?"ts":result.quality==="okay"?"tam":"to"}`}>{result.quality==="gut"?"✅ Gut":result.quality==="okay"?"👍 OK":"⚠️ Mäßig"}</span>}
                  </div>
                  <span style={{color:"var(--mu)",fontSize:12}}>{result.info}</span>
                  <div className="row" style={{marginTop:9,flexWrap:"wrap",gap:5}}>
                    <span className="tag tg">{result.calories} kcal</span>
                    <span style={{fontSize:11,color:"var(--mu)",alignSelf:"center"}}>P:{result.protein}g · K:{result.carbs}g · F:{result.fat}g</span>
                  </div>
                  {result.tip && <div style={{marginTop:9,fontSize:12,color:"var(--cy)",borderTop:"1px solid var(--bd)",paddingTop:8}}>💡 {result.tip}</div>}
                </div>
                <button className="btn btg" onClick={()=>saveMeal(result)}>✅ Speichern</button>
              </div>
            )}

            <div className="divider"/>
            <div style={{fontFamily:"var(--fh)",fontSize:13,fontWeight:800,color:"var(--mu)"}}>MANUELL EINGEBEN</div>
            <div><label className="lbl">Name</label><input className="inp" placeholder="Hähnchenbrust mit Reis…" value={manual.name} onChange={e=>setManual(m=>({...m,name:e.target.value}))}/></div>
            <div className="row">
              <div className="f1"><label className="lbl">Kcal</label><input className="inp" type="number" placeholder="350" value={manual.calories} onChange={e=>setManual(m=>({...m,calories:e.target.value}))}/></div>
              <div className="f1"><label className="lbl">Protein g</label><input className="inp" type="number" placeholder="30" value={manual.protein} onChange={e=>setManual(m=>({...m,protein:e.target.value}))}/></div>
            </div>
            <div className="row">
              <div className="f1"><label className="lbl">Kohlenhydr. g</label><input className="inp" type="number" placeholder="40" value={manual.carbs} onChange={e=>setManual(m=>({...m,carbs:e.target.value}))}/></div>
              <div className="f1"><label className="lbl">Fett g</label><input className="inp" type="number" placeholder="10" value={manual.fat} onChange={e=>setManual(m=>({...m,fat:e.target.value}))}/></div>
            </div>
            {manual.name && <button className="btn btg" onClick={()=>saveMeal(manual)}>✅ Manuell speichern</button>}
          </div>
        </div>
      )}

      {/* LOG */}
      {sub === "log" && (
        <>
          {meals.length === 0 && <div className="empty"><span className="empty-ic">🥗</span><p style={{color:"var(--mu)"}}>Noch keine Mahlzeiten getrackt</p></div>}
          {meals.map((m,i)=>(
            <div key={i} className="card" style={{padding:"12px 16px"}}>
              <div className="jb">
                <div><div style={{fontWeight:700,fontSize:14}}>{m.name}</div><div style={{fontSize:11,color:"var(--mu)"}}>{m.type} · {m.time}</div></div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--o)"}}>{m.calories} kcal</div>
                  <div style={{fontSize:10,color:"var(--mu)"}}>P:{m.protein}g · K:{m.carbs}g · F:{m.fat}g</div>
                </div>
              </div>
            </div>
          ))}
        </>
      )}

      {/* WATER */}
      {sub === "water" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--cy)",marginBottom:4}}>WASSER-TRACKER</div>
          <div style={{fontSize:12,color:"var(--mu)",marginBottom:14}}>Ziel: 8 Gläser (2,4 Liter)</div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{fontFamily:"var(--fh)",fontSize:56,fontWeight:900,color:"var(--cy)",lineHeight:1}}>{water}</div>
            <div style={{fontSize:12,color:"var(--mu)"}}>/ 8 Gläser · {water*300}ml</div>
          </div>
          <div style={{display:"flex",gap:7,justifyContent:"center",marginBottom:14}}>
            {Array.from({length:8}).map((_,i)=>(
              <div key={i} className="glass" onClick={()=>setWater(w=>i<w?Math.max(0,w-1):Math.min(8,w+1))}>
                <div className="glass-fill" style={{height:i<water?"100%":"0%"}}/>
              </div>
            ))}
          </div>
          <div className="pb" style={{height:8}}><div className="pf" style={{width:pct(water,8),background:"linear-gradient(90deg,var(--cy),var(--p))"}}/></div>
          <div className="row" style={{marginTop:11}}>
            <button className="btn btgh f1" onClick={()=>setWater(w=>Math.max(0,w-1))}>– Glas</button>
            <button className="btn btc  f1" onClick={()=>setWater(w=>Math.min(8,w+1))}>💧 + Glas</button>
          </div>
          {water >= 8 && <div style={{marginTop:11,textAlign:"center",fontSize:13,color:"var(--ok)",fontWeight:700}}>🎉 Tagesziel erreicht!</div>}
        </div>
      )}

      {/* MEAL PLAN */}
      {sub === "plan" && (
        <>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--p)",marginBottom:5}}>AI WOCHENPLAN</div>
            <p style={{fontSize:13,color:"var(--mu)",marginBottom:13}}>Claude generiert einen 7-Tage-Ernährungsplan basierend auf deinen Zielen.</p>
            <div className="row" style={{marginBottom:11}}>
              <div className="f1"><label className="lbl">Kalorien</label><input className="inp" type="number" value={macroG.cal} onChange={e=>setMacroG(g=>({...g,cal:Number(e.target.value)||0}))}/></div>
              <div className="f1"><label className="lbl">Protein (g)</label><input className="inp" type="number" value={macroG.p} onChange={e=>setMacroG(g=>({...g,p:Number(e.target.value)||0}))}/></div>
            </div>
            <button className="btn btp" onClick={genMealPlan} disabled={planLoad}>
              {planLoad ? <><span className="spin"/> Generiere Plan…</> : "🍽️ Wochenplan generieren"}
            </button>
          </div>
          {planErr && <div className="card" style={{textAlign:"center",color:"var(--er)"}}>⚠️ Fehler beim Generieren. Bitte erneut versuchen.</div>}
          {mealPlan?.days?.map((day,i)=>(
            <div key={i} className="pd">
              <div className="pdh"><span style={{fontWeight:700}}>{day.day}</span><span className="tag tg">{day.totalCal} kcal</span></div>
              <div className="pdb">
                {day.meals?.map((m,j)=>(
                  <div key={j} style={{padding:"8px 0",borderTop:j>0?"1px solid var(--bd)":"none"}}>
                    <div className="jb"><span style={{fontWeight:600,fontSize:13}}>{m.name}</span><span className="tag to" style={{fontSize:9}}>{m.cal} kcal</span></div>
                    <div style={{fontSize:11,color:"var(--mu)",marginTop:2}}>{m.type} · P:{m.p}g · K:{m.c}g · F:{m.f}g</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {mealPlan?.tip && <div className="card"><div style={{fontFamily:"var(--fh)",fontSize:13,color:"var(--g)",marginBottom:5}}>COACH-TIPP</div><p style={{fontSize:13,color:"var(--mu)"}}>{mealPlan.tip}</p></div>}
        </>
      )}

      {/* MACRO GOALS */}
      {sub === "goals" && (
        <div className="card">
          <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--g)",marginBottom:11}}>MAKRO-ZIELE</div>
          <div className="g12">
            {[["Kalorien (kcal)","cal",macroG.cal],["Protein (g)","p",macroG.p],["Kohlenhydrate (g)","c",macroG.c],["Fett (g)","f",macroG.f]].map(([l,k,v])=>(
              <div key={k}><label className="lbl">{l}</label><input className="inp" type="number" value={v} onChange={e=>setMacroG(g=>({...g,[k]:Number(e.target.value)||0}))}/></div>
            ))}
            {bmr > 0 && (
              <div className="card2">
                <div style={{fontFamily:"var(--fh)",fontSize:12,fontWeight:800,color:"var(--mu)",marginBottom:8}}>DEINE KENNZAHLEN</div>
                {[["Grundumsatz (BMR)",bmr+" kcal","var(--g)"],["TDEE (moderat aktiv)",tdee+" kcal","var(--p)"],["Ziel Muskelaufbau",(tdee+300)+" kcal","var(--ok)"],["Ziel Fettabbau",(tdee-400)+" kcal","var(--o)"]].map(([l,v,c])=>(
                  <div key={l} className="jb" style={{padding:"6px 0",borderBottom:"1px solid var(--bd)",fontSize:12}}>
                    <span style={{color:"var(--mu)"}}>{l}</span><strong style={{color:c}}>{v}</strong>
                  </div>
                ))}
                <button className="btn btg btsm" style={{marginTop:11}} onClick={()=>setMacroG(g=>({...g,cal:profile.goal==="Fettabbau"?tdee-400:tdee+250,p:Math.round((Number(profile.weight)||80)*2.2)}))}>
                  Auto-Ziele setzen
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   AI COACH  (mit Multi-Plan System)
═══════════════════════════════════════════ */
function AICoach({ profile, addXP, workouts }) {
  const PLANS_KEY = 'fitpro_saved_plans_v1';

  // ── Saved Plans (own localStorage) ────────
  const [savedPlans,   setSavedPlans]   = useState(() => {
    try { return JSON.parse(localStorage.getItem(PLANS_KEY) || '[]'); } catch { return []; }
  });
  const [activePlanId, setActivePlanId] = useState(() => {
    try { return localStorage.getItem('fitpro_active_plan') || null; } catch { return null; }
  });

  useEffect(() => {
    try { localStorage.setItem(PLANS_KEY, JSON.stringify(savedPlans)); } catch {}
  }, [savedPlans]);
  useEffect(() => {
    try { if (activePlanId) localStorage.setItem('fitpro_active_plan', activePlanId); } catch {}
  }, [activePlanId]);

  // ── UI State ───────────────────────────────
  const [sub,        setSub]        = useState("myplans");
  const [form,       setForm]       = useState({ goal:profile.goal||"Muskelaufbau", level:profile.level||"Anfänger", days:profile.days||"4", equipment:profile.equipment||"Gym", focus:(profile.zones||[]).join(", "), planName:"" });
  const [plan,       setPlan]       = useState(null);
  const [planLoad,   setPlanLoad]   = useState(false);
  const [planErr,    setPlanErr]    = useState(false);
  const [expanded,   setExpanded]   = useState(null);
  const [saveModal,  setSaveModal]  = useState(false);
  const [saveName,   setSaveName]   = useState("");
  const [savedOk,    setSavedOk]    = useState(false);
  const [viewPlan,   setViewPlan]   = useState(null);  // plan being viewed from saved list
  const [viewExp,    setViewExp]    = useState(null);
  const [editNameId, setEditNameId] = useState(null);
  const [editNameVal,setEditNameVal]= useState("");
  const [delPlanId,  setDelPlanId]  = useState(null);

  const [meso,       setMeso]       = useState(null);
  const [mesoLoad,   setMesoLoad]   = useState(false);
  const [mesoErr,    setMesoErr]    = useState(false);
  const [mesoExp,    setMesoExp]    = useState(null);
  const [chat,       setChat]       = useState([]);
  const [chatIn,     setChatIn]     = useState("");
  const [chatLoad,   setChatLoad]   = useState(false);
  const [frmPhoto,   setFrmPhoto]   = useState(null);
  const [frmB64,     setFrmB64]     = useState(null);
  const [frmEx,      setFrmEx]      = useState("Bankdrücken");
  const [frmResult,  setFrmResult]  = useState(null);
  const [frmLoad,    setFrmLoad]    = useState(false);
  const [frmErr,     setFrmErr]     = useState(false);
  const frmRef  = useRef();
  const chatEnd = useRef();

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:"smooth" }); }, [chat]);

  // ── Plan generation ────────────────────────
  const genPlan = async () => {
    setPlanLoad(true); setPlan(null); setPlanErr(false); setSaveModal(false); setSavedOk(false);
    try {
      const txt = await askClaude("Du bist Sportwissenschaftler. Nur JSON, kein Markdown.",
        `${form.days}-Tage Trainingsplan: Ziel=${form.goal}, Level=${form.level}, Equipment=${form.equipment}, Fokus=${form.focus||"Ganzkörper"}. JSON: {"name":"...","description":"...","duration":"8 Wochen","progressionTip":"...","days":[{"day":"Tag 1 – Push","focus":"Brust,Schultern,Trizeps","warmup":"3 Min Aufwärmen","exercises":[{"name":"Bankdrücken","sets":"4","reps":"8-10","rest":"90s","tip":"...","progressive":"..."}],"cooldown":"5 Min Stretching"}],"tips":["...","...","..."]}`);
      const parsed = parseJSON(txt);
      if (parsed) {
        setPlan(parsed);
        // Pre-fill save name suggestion
        setSaveName(`${form.equipment} – ${form.goal} (${form.days}×/Woche)`);
        addXP(50);
      } else { setPlanErr(true); }
    } catch { setPlanErr(true); }
    setPlanLoad(false);
  };

  // ── Save plan ──────────────────────────────
  const savePlan = () => {
    if (!plan || !saveName.trim()) return;
    const newPlan = {
      id: Date.now(),
      name: saveName.trim(),
      goal: form.goal,
      level: form.level,
      equipment: form.equipment,
      days: form.days,
      date: new Date().toLocaleDateString("de"),
      ...plan,
    };
    setSavedPlans(ps => [newPlan, ...ps]);
    setActivePlanId(newPlan.id);
    setSaveModal(false);
    setSavedOk(true);
    setTimeout(() => setSavedOk(false), 2500);
  };

  const deletePlan = (id) => {
    setSavedPlans(ps => ps.filter(p => p.id !== id));
    if (activePlanId === id) setActivePlanId(savedPlans.find(p => p.id !== id)?.id || null);
    setDelPlanId(null);
    if (viewPlan?.id === id) setViewPlan(null);
  };

  const renamePlan = (id) => {
    if (!editNameVal.trim()) return;
    setSavedPlans(ps => ps.map(p => p.id === id ? { ...p, name: editNameVal.trim() } : p));
    setEditNameId(null);
  };

  // ── Meso + Chat + Form ─────────────────────
  const genMeso = async () => {
    setMesoLoad(true); setMeso(null); setMesoErr(false);
    try {
      const txt = await askClaude("Du bist Sportwissenschaftler. Nur JSON, kein Markdown.",
        `8-Wochen-Mesozyklus: Ziel=${form.goal}, Level=${form.level}. JSON: {"name":"...","weeks":[{"week":1,"phase":"Eingewöhnung","volume":"mittel","intensity":"niedrig","tip":"...","days":[{"day":"Mo","type":"Push","exercises":"Bankdrücken 3×10, Schulterdrücken 3×10"},{"day":"Mi","type":"Pull","exercises":"Klimmzüge 3×8"},{"day":"Fr","type":"Legs","exercises":"Kniebeugen 3×10"}]}]}`);
      const parsed = parseJSON(txt);
      if (parsed) { setMeso(parsed); } else { setMesoErr(true); }
    } catch { setMesoErr(true); }
    setMesoLoad(false);
  };

  const sendChat = async () => {
    if (!chatIn.trim()) return;
    const msg = chatIn.trim(); setChatIn("");
    setChat(c => [...c, { role:"user", text:msg }]);
    setChatLoad(true);
    try {
      const recentW = workouts.slice(0,3).map(w=>`${w.date}: ${w.exercises?.map(e=>e.name).join(", ")}`).join(" | ");
      const hist    = chat.slice(-6).map(m=>`${m.role==="user"?"Du":"Coach"}: ${m.text}`).join("\n");
      const activePlan = savedPlans.find(p => p.id === activePlanId);
      const txt = await askClaude(
        `Du bist persönlicher AI Fitness-Coach. Profil: Ziel=${profile.goal||"Muskelaufbau"}, Level=${profile.level||"Anfänger"}, Gewicht=${profile.weight||"?"}kg. Aktiver Plan: ${activePlan?.name||"keiner"}. Letzte Workouts: ${recentW||"keine"}. Antworte auf Deutsch, konkret, max 3 Absätze.`,
        hist ? `${hist}\nDu: ${msg}` : msg);
      setChat(c => [...c, { role:"ai", text:txt }]);
    } catch { setChat(c => [...c, { role:"ai", text:"Verbindungsfehler." }]); }
    setChatLoad(false);
  };

  const analyzeForm = async () => {
    if (!frmB64) return;
    setFrmLoad(true); setFrmResult(null); setFrmErr(false);
    try {
      const txt = await askClaude("Du bist Elite-Personal-Trainer. Analysiere Trainingsform auf Fotos präzise auf Deutsch.",
        [{ type:"image", source:{ type:"base64", media_type:"image/jpeg", data:frmB64 } },
         { type:"text",  text:`Analysiere die Übungsausführung bei "${frmEx}". Gib: 1) Bewertung 1-10, 2) Was gut ist, 3) Was verbessert werden muss, 4) Verletzungsrisiken, 5) Konkrete Korrektur-Tipps.` }], true);
      setFrmResult(txt); addXP(75);
    } catch { setFrmErr(true); }
    setFrmLoad(false);
  };

  const activePlan = savedPlans.find(p => p.id === activePlanId);
  const QS = ["Wieviel Protein täglich?","Progressive Overload erklären","Beste Übungen für V-Taper?","Cardio vor oder nach Training?","Was ist Deload?","Optimale Satzzahl pro Muskel?"];

  // Equipment color helper
  const eqColor = (eq) => eq?.toLowerCase().includes('gym') ? 'var(--g)' : eq?.toLowerCase().includes('zuhause') || eq?.toLowerCase().includes('home') ? 'var(--cy)' : 'var(--am)';
  const eqIcon  = (eq) => eq?.toLowerCase().includes('gym') ? '🏋️' : eq?.toLowerCase().includes('zuhause') || eq?.toLowerCase().includes('home') ? '🏠' : '💪';

  return (
    <div>
      <div className="hdr"><div className="ht">AI COACH</div><span className="tag tp">🤖 Claude AI</span></div>
      <div className="stabs">
        {[["myplans","📚 Meine Pläne"],["plan","✨ Neuer Plan"],["meso","🔄 Mesozyklus"],["chat","💬 Chat"],["form","🎥 Form-Check"]].map(([id,l])=>(
          <div key={id} className={`stab${sub===id?" on":""}`} onClick={()=>{ setSub(id); setViewPlan(null); }}>{l}</div>
        ))}
      </div>

      {/* ══ MEINE PLÄNE ══ */}
      {sub === "myplans" && !viewPlan && (
        <>
          {/* Active plan banner */}
          {activePlan && (
            <div className="card" style={{background:"linear-gradient(135deg,#101028,#0b1020)",borderColor:"rgba(123,97,255,.25)"}}>
              <div style={{fontSize:9,color:"var(--mu)",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>✅ AKTIVER PLAN</div>
              <div style={{fontFamily:"var(--fh)",fontSize:22,fontWeight:900,color:"var(--g)",marginBottom:3}}>{activePlan.name}</div>
              <div className="row" style={{gap:6,flexWrap:"wrap",marginBottom:11}}>
                <span className="tag tg">{eqIcon(activePlan.equipment)} {activePlan.equipment}</span>
                <span className="tag tp">{activePlan.goal}</span>
                <span className="tag tc">{activePlan.days}×/Woche</span>
              </div>
              <button className="btn btgh btsm" style={{fontSize:12}} onClick={()=>setViewPlan(activePlan)}>Plan anzeigen →</button>
            </div>
          )}

          {/* Plan list */}
          {savedPlans.length === 0 ? (
            <div className="empty">
              <span className="empty-ic">📋</span>
              <p style={{color:"var(--mu)",marginBottom:14}}>Noch keine Pläne gespeichert.</p>
              <button className="btn btp btsm" style={{width:"auto",margin:"0 auto"}} onClick={()=>setSub("plan")}>✨ Ersten Plan erstellen</button>
            </div>
          ) : (
            <>
              <div className="sec">ALLE PLÄNE ({savedPlans.length})</div>
              {savedPlans.map((p) => (
                <div key={p.id} className="card" style={{borderColor: p.id===activePlanId ? "rgba(200,255,0,.3)" : "var(--bd)"}}>

                  {/* Delete confirm */}
                  {delPlanId === p.id && (
                    <div style={{background:"rgba(255,71,87,.1)",border:"1px solid rgba(255,71,87,.25)",borderRadius:10,padding:"10px 12px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                      <span style={{fontSize:13,fontWeight:600}}>Plan löschen?</span>
                      <div className="row" style={{gap:6}}>
                        <button onClick={()=>setDelPlanId(null)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:7,padding:"6px 11px",color:"var(--tx)",cursor:"pointer",fontSize:12,fontWeight:700}}>Abbrechen</button>
                        <button onClick={()=>deletePlan(p.id)} style={{background:"var(--er)",border:"none",borderRadius:7,padding:"6px 11px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Löschen</button>
                      </div>
                    </div>
                  )}

                  {/* Plan header */}
                  <div className="jb" style={{marginBottom:8}}>
                    {editNameId === p.id ? (
                      <div className="row f1" style={{gap:6,marginRight:8}}>
                        <input className="inp f1" style={{padding:"7px 10px",fontSize:13}} value={editNameVal} onChange={e=>setEditNameVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&renamePlan(p.id)} autoFocus/>
                        <button onClick={()=>renamePlan(p.id)} style={{background:"var(--g)",border:"none",borderRadius:8,padding:"7px 11px",color:"#07070f",cursor:"pointer",fontWeight:700,fontSize:12}}>✓</button>
                        <button onClick={()=>setEditNameId(null)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:8,padding:"7px 11px",color:"var(--tx)",cursor:"pointer",fontSize:12}}>✕</button>
                      </div>
                    ) : (
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:15,color: p.id===activePlanId?"var(--g)":"var(--tx)"}}>{p.id===activePlanId?"⚡ ":""}{p.name}</div>
                        <div style={{fontSize:10,color:"var(--mu)",marginTop:2}}>Erstellt: {p.date}</div>
                      </div>
                    )}
                    {editNameId !== p.id && (
                      <div className="row" style={{gap:5}}>
                        <button onClick={()=>{ setEditNameId(p.id); setEditNameVal(p.name); }} className="edit-btn">✏️</button>
                        <button onClick={()=>setDelPlanId(delPlanId===p.id?null:p.id)} className="del-btn">🗑️</button>
                      </div>
                    )}
                  </div>

                  {/* Tags */}
                  <div className="row" style={{gap:5,flexWrap:"wrap",marginBottom:10}}>
                    <span className="tag" style={{background:`rgba(0,0,0,.2)`,color:eqColor(p.equipment),border:`1px solid ${eqColor(p.equipment)}44`}}>{eqIcon(p.equipment)} {p.equipment}</span>
                    <span className="tag tp">{p.goal}</span>
                    <span className="tag tc">{p.days}×/Woche</span>
                    <span className="tag tam">{p.level}</span>
                  </div>

                  {/* Actions */}
                  <div className="row" style={{gap:7}}>
                    <button className="btn btgh f1 btsm" style={{fontSize:12}} onClick={()=>setViewPlan(p)}>📋 Anzeigen</button>
                    {p.id !== activePlanId ? (
                      <button className="btn btg f1 btsm" style={{fontSize:12}} onClick={()=>setActivePlanId(p.id)}>⚡ Aktivieren</button>
                    ) : (
                      <button className="btn btsm f1" style={{fontSize:12,background:"rgba(200,255,0,.12)",color:"var(--g)",border:"1px solid rgba(200,255,0,.3)"}}>✅ Aktiv</button>
                    )}
                  </div>
                </div>
              ))}
              <div style={{padding:"4px 14px 8px"}}>
                <button className="btn btp btsm" onClick={()=>setSub("plan")}>✨ Neuen Plan erstellen</button>
              </div>
            </>
          )}
        </>
      )}

      {/* ══ PLAN DETAIL VIEW ══ */}
      {sub === "myplans" && viewPlan && (
        <>
          <div style={{position:"sticky",top:0,zIndex:60,background:"var(--bg)",padding:"8px 14px 10px",borderBottom:"1px solid var(--bd)",backdropFilter:"blur(8px)"}}>
            <div className="jb">
              <div>
                <div style={{fontSize:9,color:"var(--mu)",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{eqIcon(viewPlan.equipment)} {viewPlan.equipment}</div>
                <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--g)",lineHeight:1.1}}>{viewPlan.name}</div>
              </div>
              <button className="btn btgh btsm" style={{width:"auto"}} onClick={()=>setViewPlan(null)}>← Zurück</button>
            </div>
          </div>

          <div className="card" style={{background:"linear-gradient(135deg,#131028,#0c1020)",borderColor:"rgba(123,97,255,.2)"}}>
            <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--p)",marginBottom:4}}>{viewPlan.name}</div>
            <p style={{fontSize:13,color:"var(--mu)",marginBottom:9}}>{viewPlan.description}</p>
            <div className="row" style={{gap:6,flexWrap:"wrap"}}>
              <span className="tag tp">📅 {viewPlan.duration}</span>
              <span className="tag tc">{viewPlan.days}×/Woche</span>
              <span className="tag tg">{viewPlan.goal}</span>
            </div>
            {viewPlan.progressionTip && <div style={{fontSize:12,color:"var(--cy)",borderTop:"1px solid var(--bd)",paddingTop:9,marginTop:9}}>📈 {viewPlan.progressionTip}</div>}
          </div>

          {viewPlan.days?.map((day,i)=>(
            <div key={i} className="pd">
              <div className="pdh" onClick={()=>setViewExp(viewExp===i?null:i)}>
                <div><div style={{fontWeight:700,fontSize:14}}>{day.day}</div><div style={{fontSize:11,color:"var(--mu)"}}>{day.focus}</div></div>
                <span style={{color:"var(--mu)",fontSize:15,fontWeight:700}}>{viewExp===i?"↑":"↓"}</span>
              </div>
              {viewExp===i && (
                <div className="pdb">
                  {day.warmup && <div style={{fontSize:11,color:"var(--am)",marginBottom:9}}>🔥 {day.warmup}</div>}
                  {day.exercises?.map((ex,j)=>(
                    <div key={j} style={{padding:"9px 0",borderTop:j>0?"1px solid var(--bd)":"none"}}>
                      <div className="jb" style={{marginBottom:3}}>
                        <span style={{fontWeight:700,fontSize:13}}>{ex.name}</span>
                        <div className="row" style={{gap:4}}>
                          <span className="tag tg" style={{fontSize:9}}>{ex.sets}×{ex.reps}</span>
                          <span className="tag to" style={{fontSize:9}}>⏱{ex.rest}</span>
                        </div>
                      </div>
                      {ex.tip && <div style={{fontSize:11,color:"var(--mu)"}}>💡 {ex.tip}</div>}
                      {ex.progressive && <div style={{fontSize:10,color:"var(--ok)",marginTop:2}}>📈 {ex.progressive}</div>}
                    </div>
                  ))}
                  {day.cooldown && <div style={{fontSize:11,color:"var(--p)",marginTop:9}}>🧘 {day.cooldown}</div>}
                </div>
              )}
            </div>
          ))}

          {viewPlan.tips?.length > 0 && (
            <div className="card">
              <div style={{fontFamily:"var(--fh)",fontSize:13,fontWeight:900,color:"var(--g)",marginBottom:8}}>PRO TIPPS</div>
              {viewPlan.tips.map((t,i)=><div key={i} style={{padding:"6px 0",borderTop:i>0?"1px solid var(--bd)":"none",fontSize:12,display:"flex",gap:7}}><span style={{color:"var(--g)"}}>▸</span><span>{t}</span></div>)}

          <div style={{padding:"0 14px 4px"}}>
            {viewPlan.id !== activePlanId

      {/* ══ NEUER PLAN ══ */}
      {sub === "plan" && (
        <>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--p)",marginBottom:11}}>AI TRAININGSPLAN ERSTELLEN</div>

              <div>
                <label className="lbl">Plan-Name (optional)</label>

              </div>
              <div className="row">
                <div className="f1"><label className="lbl">Ziel</label><select className="sel" value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))}>{["Muskelaufbau","Fettabbau","Kraft steigern","Ausdauer","Definition"].map(g=><option key={g}>{g}</option>)}</select></div>
                <div className="f1"><label className="lbl">Level</label><select className="sel" value={form.level} onChange={e=>setForm(f=>({...f,level:e.target.value}))}>{["Anfänger","Fortgeschrittener","Profi"].map(l=><option key={l}>{l}</option>)}</select></div>
              </div>
              <div className="row">
                <div className="f1"><label className="lbl">Tage/Woche</label><select className="sel" value={form.days} onChange={e=>setForm(f=>({...f,days:e.target.value}))}>{["2","3","4","5","6"].map(d=><option key={d}>{d}</option>)}</select></div>
                <div className="f1"><label className="lbl">Equipment</label><select className="sel" value={form.equipment} onChange={e=>setForm(f=>({...f,equipment:e.target.value}))}>{["Gym","Zuhause KH","Kein Equipment","Barbell only"].map(e=><option key={e}>{e}</option>)}</select></div>
              </div>
              <div><label className="lbl">Fokus / Problemzonen</label><input className="inp" placeholder="z.B. Brust, Rücken, Bauch…" value={form.focus} onChange={e=>setForm(f=>({...f,focus:e.target.value}))}/></div>
              <button className="btn btp" onClick={genPlan} disabled={planLoad}>{planLoad?<><span className="spin"/> Generiere Plan…</>:"🤖 Plan generieren"}</button>
            </div>
          </div>

          {planErr && <div className="card" style={{textAlign:"center",color:"var(--er)"}}>⚠️ Fehler. Bitte erneut versuchen.</div>}

          {savedOk && <div style={{margin:"0 14px 10px",padding:"11px 14px",background:"rgba(0,230,118,.1)",border:"1px solid rgba(0,230,118,.3)",borderRadius:12,fontSize:13,fontWeight:700,color:"var(--ok)",textAlign:"center"}}>✅ Plan gespeichert!</div>}

          {plan && !savedOk && (
            <>
              {/* Save banner */}
              {!saveModal ? (
                <div style={{margin:"0 14px 10px",padding:"13px 15px",background:"rgba(200,255,0,.08)",border:"1px solid rgba(200,255,0,.25)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--g)"}}>Plan generiert!</div>
                    <div style={{fontSize:12,color:"var(--mu)"}}>Speichern um ihn zu behalten</div>
                  </div>

                <div className="card" style={{borderColor:"rgba(200,255,0,.25)"}}>
                  <div style={{fontFamily:"var(--fh)",fontSize:15,fontWeight:900,color:"var(--g)",marginBottom:9}}>PLAN SPEICHERN</div>
                  <div className="g8">
                    <div><label className="lbl">Plan-Name</label><input className="inp" placeholder="z.B. 🏋️ Gym Plan" value={saveName} onChange={e=>setSaveName(e.target.value)} autoFocus/></div>
                    <div className="row" style={{gap:7}}>
                      <button className="btn btgh f1 btsm" onClick={()=>setSaveModal(false)}>Abbrechen</button>
                      <button className="btn btg f1 btsm" onClick={savePlan} disabled={!saveName.trim()}>💾 Speichern</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Plan preview */}
              <div className="card" style={{background:"linear-gradient(135deg,#131028,#0c1020)",borderColor:"rgba(123,97,255,.2)"}}>
                <div style={{fontFamily:"var(--fh)",fontSize:22,fontWeight:900,color:"var(--p)"}}>{plan.name}</div>
                <p style={{fontSize:13,color:"var(--mu)",margin:"5px 0 9px"}}>{plan.description}</p>
                {plan.progressionTip && <div style={{fontSize:12,color:"var(--cy)",borderTop:"1px solid var(--bd)",paddingTop:9}}>📈 {plan.progressionTip}</div>}
              </div>
              {plan.days?.map((day,i)=>(
                <div key={i} className="pd">
                  <div className="pdh" onClick={()=>setExpanded(expanded===i?null:i)}>
                    <div><div style={{fontWeight:700,fontSize:14}}>{day.day}</div><div style={{fontSize:11,color:"var(--mu)"}}>{day.focus}</div></div>
                    <span style={{color:"var(--mu)",fontSize:15,fontWeight:700}}>{expanded===i?"↑":"↓"}</span>
                  </div>
                  {expanded===i && (
                    <div className="pdb">
                      {day.warmup && <div style={{fontSize:11,color:"var(--am)",marginBottom:9}}>🔥 {day.warmup}</div>}
                      {day.exercises?.map((ex,j)=>(
                        <div key={j} style={{padding:"9px 0",borderTop:j>0?"1px solid var(--bd)":"none"}}>
                          <div className="jb" style={{marginBottom:3}}>
                            <span style={{fontWeight:700,fontSize:13}}>{ex.name}</span>
                            <div className="row" style={{gap:4}}>
                              <span className="tag tg" style={{fontSize:9}}>{ex.sets}×{ex.reps}</span>
                              <span className="tag to" style={{fontSize:9}}>⏱{ex.rest}</span>
                            </div>
                          </div>
                          {ex.tip && <div style={{fontSize:11,color:"var(--mu)"}}>💡 {ex.tip}</div>}
                          {ex.progressive && <div style={{fontSize:10,color:"var(--ok)",marginTop:2}}>📈 {ex.progressive}</div>}
                        </div>
                      ))}
                      {day.cooldown && <div style={{fontSize:11,color:"var(--p)",marginTop:9}}>🧘 {day.cooldown}</div>}
                    </div>
                  )}
                </div>
              ))}
              {plan.tips?.length > 0 && (
                <div className="card">
                  <div style={{fontFamily:"var(--fh)",fontSize:13,fontWeight:900,color:"var(--g)",marginBottom:8}}>PRO TIPPS</div>
                  {plan.tips.map((t,i)=><div key={i} style={{padding:"6px 0",borderTop:i>0?"1px solid var(--bd)":"none",fontSize:12,display:"flex",gap:7}}><span style={{color:"var(--g)"}}>▸</span><span>{t}</span></div>)}
                </div>

            </>

        </>

      {/* ══ MESOZYKLUS ══ */}
      {sub === "meso" && (
        <>
          <div className="card">
            <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:900,color:"var(--cy)",marginBottom:5}}>8-WOCHEN MESOZYKLUS</div>
            <p style={{fontSize:13,color:"var(--mu)",marginBottom:13}}>Wissenschaftliche Periodisierung mit progressiver Belastung & Deload-Wochen.</p>
            <button className="btn btc" onClick={genMeso} disabled={mesoLoad}>{mesoLoad?<><span className="spin"/> Generiere…</>:"🔄 Mesozyklus generieren"}</button>
          </div>
          {mesoErr && <div className="card" style={{textAlign:"center",color:"var(--er)"}}>⚠️ Fehler. Bitte erneut.</div>}
          {meso?.weeks?.map((w,i)=>(
            <div key={i} className="pd">
              <div className="pdh" onClick={()=>setMesoExp(mesoExp===i?null:i)}>
                <div className="ac">
                  <div style={{fontFamily:"var(--fh)",fontSize:20,fontWeight:900,color:"var(--cy)",width:34}}>W{w.week}</div>
